      disagree: disagree_step1_ticket

  - id: resolve_clap_reset_w12
    type: message
    prompt:
      text: |
        We checked your activity data for the week **{{ ctx.collected.w12_label }}** (oldest available).

        During that week, you spent **{{ ctx.collected.w12_mins | round(1) }} minutes** on the platform.

        The weekly clap is maintained only when you spend **at least 60 minutes per week** on iGOT Karmayogi. Since the time spent in that week was below the 60-minute threshold, the **weekly clap count was reset to zero**.

        ℹ️ Your weekly clap will start building again from the next week in which you spend 60 or more minutes on the platform.

        > **Note:** The Insights API provides data for only the last 12 weeks. If the clap streak exceeded 12 weeks, the exact reset point may be beyond the available history.
    quick_replies:
      - { id: agree,    label: "✅ I understand" }
      - { id: disagree, label: "❌ I disagree — I spent more time" }
    disable_input: true
    on_reply:
      agree:    satisfied
      disagree: disagree_step1_ticket

  # ===========================================================================
  # 3b. All 12 weeks ≥ 60 min — discrepancy detected → raise ticket
  # ===========================================================================
  - id: resolution_discrepancy
    type: message
    prompt:
      text: |
        We reviewed your weekly activity data for the last 12 weeks and found that you met the **60-minute threshold** in all available weeks:

        | Week | Time Spent |
        |------|-----------|
        | {{ ctx.collected.w1_label }} | {{ ctx.collected.w1_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w2_label }} | {{ ctx.collected.w2_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w3_label }} | {{ ctx.collected.w3_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w4_label }} | {{ ctx.collected.w4_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w5_label }} | {{ ctx.collected.w5_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w6_label }} | {{ ctx.collected.w6_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w7_label }} | {{ ctx.collected.w7_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w8_label }} | {{ ctx.collected.w8_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w9_label }} | {{ ctx.collected.w9_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w10_label }} | {{ ctx.collected.w10_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w11_label }} | {{ ctx.collected.w11_mins | default(0) | round(1) }} min |
        | {{ ctx.collected.w12_label }} | {{ ctx.collected.w12_mins | default(0) | round(1) }} min |

        Since your time spent meets the requirement across all tracked weeks, this appears to be a **discrepancy** that requires investigation by our technical team.
    next: discrepancy_step1_ticket

  - id: discrepancy_step1_ticket
    type: message
    prompt:
      text: |
        **Issue Identified:** Weekly Clap Not Credited — Discrepancy Detected

        **Summary of Request:**
        You reported that your weekly activity data shows you met the 60-minute threshold across all tracked weeks, but the weekly clap was not credited. You would like us to investigate this technical discrepancy.
        {% if ctx.collected.total_claps is not none %}
        • **Current Weekly Clap Count:** {{ ctx.collected.total_claps }}
        {% endif %}

        Please review the details above and confirm whether they are correct.
    quick_replies:
      - { id: confirm, label: "✅ Confirm" }
      - { id: cancel,  label: "❌ Cancel" }
    disable_input: true
    on_reply:
      confirm: discrepancy_auto_ticket
      cancel:  satisfied

  - id: disagree_step1_ticket
    type: message
    prompt:
      text: |
        **Issue Identified:** Weekly Clap Reset — Disputed Activity Data

        **Summary of Request:**
        You reported that your recorded activity time does not match your actual time spent on the platform. You would like us to investigate this discrepancy.
        {% if ctx.collected.total_claps is not none %}
        • **Current Weekly Clap Count:** {{ ctx.collected.total_claps }}
        {% endif %}

        Please review the details above and confirm whether they are correct.
    quick_replies:
      - { id: confirm, label: "✅ Confirm" }
      - { id: cancel,  label: "❌ Cancel" }
    disable_input: true
    on_reply:
      confirm: disagree_auto_ticket
      cancel:  satisfied

  # ===========================================================================
  # Ticket path — User disagrees with reset explanation (SOP 1.3.3)
  # ===========================================================================
  - id: disagree_auto_ticket
    type: transfer_llm
    auto_raise: silent
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user disputes the weekly clap reset explanation provided by the bot.
        Generate a Zoho support ticket for further investigation.
        Subject: "Weekly Clap Issue — User Disputes Reset Explanation"
        Description: include total_claps, all 12 weeks of activity data
        (w1_label through w12_label with corresponding wX_mins values in minutes), user email,
        and a note that the user believes they spent more time than the system recorded.
      priority_override: P3
    on_complete: confirm_ticket
    on_restart: fetch_user_profile

  # ===========================================================================
  # Ticket path — Discrepancy (all weeks ≥ 60 min but clap not credited) (SOP 1.3.1)
  # ===========================================================================
  - id: discrepancy_auto_ticket
    type: transfer_llm
    auto_raise: silent
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user's weekly clap was not credited despite meeting the 60-minute threshold
        in all 12 available weeks of Insights API data.
        Generate a Zoho support ticket for the technical team to investigate.
        Subject: "Weekly Clap Discrepancy — Threshold Met But Clap Not Credited"
        Description: include total_claps, all 12 weeks of activity data
        (w1_label through w12_label with wX_mins values in minutes), user email,
        and the finding that all available weeks show ≥ 60 minutes yet the
        weekly clap count was not updated correctly.
        Engineering note: clarification required if the streak exceeds 12 weeks —
        historical data beyond 12 weeks is unavailable from the Insights API.
      priority_override: P3
    on_complete: confirm_ticket
    on_restart: fetch_user_profile

  # ===========================================================================
  # Insights API — 404 Not Found (no activity data available for this user)
  # ===========================================================================
  - id: no_insights_data
    type: message
    prompt:
      text: |
        We could not find any weekly activity data for your account on iGOT Karmayogi.

        This typically happens when:
        - You have not completed any learning activity yet, **or**
        - Your account is newly created and no activity has been recorded.

        The weekly clap is awarded only after completing **at least 60 minutes of learning per week**.
        Once you start learning, your activity will appear here.
    next: satisfied

  # ===========================================================================
  # Insights API error fallback (timeout / server error)
  # ===========================================================================
  - id: api_error_fallback
    type: message
    prompt:
      text: |
        I'm unable to retrieve your activity data right now. Please try again in a few minutes.
    next: satisfied
