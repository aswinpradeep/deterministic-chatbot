# =============================================================================
# MODE B — DETERMINISTIC + LLM TICKET TAIL
# =============================================================================
# Flow: Weekly Clap Not Updated / Reset to Zero / Not Credited
#
# Logic:
#   1. Call Search API -> retrieve rootOrgId
#   2. Call Insights API (v2) → retrieve weekly activity (w1 = current week, w12 = 12 weeks ago)
#   3. Traverse w1 → w2 → ... → w12 to find the first week with timespent < 60 min
#   4a. Reset week found (timespent < 60 min):
#       → Inform user of exact time spent and the 60-minute rule
#       → If user agrees  → close (self-served)
#       → If user disagrees → raise ticket
#   4b. All 12 weeks ≥ 60 min → discrepancy detected → raise ticket for tech team
#
# SOP: Use Case – Weekly Clap Not Updated / Reset to Zero / Not Credited
# =============================================================================

flow_id: WEEKLY_CLAP_ISSUE
flow_type: deterministic_with_llm_fallback
version: 1

metadata:
  category:         platform
  menu_label:       "👏 Weekly clap not updated / reset"
  menu_group:       "Recognition & Engagement"
  menu_group_order: 4
  menu_order:       9
  classification:   Incident
  default_portal:   Learner Portal
  default_priority: P3
  default_severity: Sev 3

enabled_channels: [web]

classification:
  triggers:
    - "weekly clap not updated"
    - "clap count reset to zero"
    - "weekly clap reset"
    - "weekly clap not credited"
    - "clap not increasing"
    - "weekly clap issue"
    - "weekly clap problem"
    - "weekly clap dropped"
    - "lost my weekly clap"
    - "weekly clap went to zero"

entry_node: fetch_user_profile

imports:
  - _terminal
  - fragment: _zoho_ticket
    with:
      cf_category:     platform
      cf_sub_category: weekly_clap
      cf_flow_id:      WEEKLY_CLAP_ISSUE

nodes:
  # ===========================================================================
  # 1. Fetch User Profile to get rootOrgId
  # ===========================================================================
  - id: fetch_user_profile
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/private/user/v1/search"
      body:
        request:
          filters:
            userId: "{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.result.response.content[0].rootOrgId", to: ctx.root_org_id }
    on_success: fetch_insights_data
    on_error:
      any: api_error_fallback
    timeout_ms: 8000

  # ===========================================================================
  # 2. Fetch Insights API v2 — weekly activity data (w1 = current, w12 = oldest)
  # timespent values are in MINUTES; threshold = 60 minutes
  # ===========================================================================
  - id: fetch_insights_data
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/chatbot/v2/insights"
      headers:
        x-authenticated-userid: "{{ ctx.user_id_hash }}"
      body:
        request:
          filters:
            primaryCategory: "programs"
            organisations:
              - "across"
              - "{{ ctx.root_org_id }}"
    response_mapping:
      - { from: "$.result.response.weekly-claps.w1.timespent", to: collected.w1_mins }
      - { from: "$.result.response.weekly-claps.w2.timespent", to: collected.w2_mins }
      - { from: "$.result.response.weekly-claps.w3.timespent", to: collected.w3_mins }
      - { from: "$.result.response.weekly-claps.w4.timespent", to: collected.w4_mins }
      - { from: "$.result.response.weekly-claps.w5.timespent", to: collected.w5_mins }
      - { from: "$.result.response.weekly-claps.w6.timespent", to: collected.w6_mins }
      - { from: "$.result.response.weekly-claps.w7.timespent", to: collected.w7_mins }
      - { from: "$.result.response.weekly-claps.w8.timespent", to: collected.w8_mins }
      - { from: "$.result.response.weekly-claps.w9.timespent", to: collected.w9_mins }
      - { from: "$.result.response.weekly-claps.w10.timespent", to: collected.w10_mins }
      - { from: "$.result.response.weekly-claps.w11.timespent", to: collected.w11_mins }
      - { from: "$.result.response.weekly-claps.w12.timespent", to: collected.w12_mins }
      - { from: "$.result.response.weekly-claps.total_claps",  to: collected.total_claps }
      - { from: "$.result.response.weekly-claps.startDate",     to: collected.week_start_date }
      - { from: "$.result.response.weekly-claps.endDate",       to: collected.week_end_date }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w1_label, transform: week_label_w1 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w2_label, transform: week_label_w2 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w3_label, transform: week_label_w3 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w4_label, transform: week_label_w4 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w5_label, transform: week_label_w5 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w6_label, transform: week_label_w6 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w7_label, transform: week_label_w7 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w8_label, transform: week_label_w8 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w9_label, transform: week_label_w9 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w10_label, transform: week_label_w10 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w11_label, transform: week_label_w11 }
      - { from: "$.result.response.weekly-claps.startDate", to: collected.w12_label, transform: week_label_w12 }
    on_success: branch_has_data
    on_error:
      not_found: no_insights_data
      any:       api_error_fallback
    timeout_ms: 8000

  # ===========================================================================
  # 1b. Guard — verify at least one week has a usable timespent value.
  # ===========================================================================
  - id: branch_has_data
    type: branch
    rules:
      - if: >
          ctx.collected.w1_mins == None and ctx.collected.w2_mins == None and ctx.collected.w3_mins == None and ctx.collected.w4_mins == None and ctx.collected.w5_mins == None and ctx.collected.w6_mins == None and ctx.collected.w7_mins == None and ctx.collected.w8_mins == None and ctx.collected.w9_mins == None and ctx.collected.w10_mins == None and ctx.collected.w11_mins == None and ctx.collected.w12_mins == None
        then: no_insights_data
    default: branch_check_week1

  - id: no_week_data
    type: message
    prompt:
      text: |
        We received a response from the system, but your weekly activity data appears to be empty or unavailable at this time.

        This can happen if:
        - Your learning activity has not been synced yet (usually takes up to 24 hours), **or**
        - There is a temporary data availability issue on the platform.

        Please try again later.
    next: satisfied

  # ===========================================================================
  # 2. Traverse w1 → ... → w12 to find the reset point
  # ===========================================================================

  - id: branch_check_week1
    type: branch
    rules:
      - { if: "ctx.collected.w1_mins != None and ctx.collected.w1_mins < 60",
          then: resolve_clap_reset_w1 }
    default: branch_check_week2

  - id: branch_check_week2
    type: branch
    rules:
      - { if: "ctx.collected.w2_mins != None and ctx.collected.w2_mins < 60",
          then: resolve_clap_reset_w2 }
    default: branch_check_week3

  - id: branch_check_week3
    type: branch
    rules:
      - { if: "ctx.collected.w3_mins != None and ctx.collected.w3_mins < 60",
          then: resolve_clap_reset_w3 }
    default: branch_check_week4

  - id: branch_check_week4
    type: branch
    rules:
      - { if: "ctx.collected.w4_mins != None and ctx.collected.w4_mins < 60",
          then: resolve_clap_reset_w4 }
    default: branch_check_week5

  - id: branch_check_week5
    type: branch
    rules:
      - { if: "ctx.collected.w5_mins != None and ctx.collected.w5_mins < 60",
          then: resolve_clap_reset_w5 }
    default: branch_check_week6

  - id: branch_check_week6
    type: branch
    rules:
      - { if: "ctx.collected.w6_mins != None and ctx.collected.w6_mins < 60",
          then: resolve_clap_reset_w6 }
    default: branch_check_week7

  - id: branch_check_week7
    type: branch
    rules:
      - { if: "ctx.collected.w7_mins != None and ctx.collected.w7_mins < 60",
          then: resolve_clap_reset_w7 }
    default: branch_check_week8

  - id: branch_check_week8
    type: branch
    rules:
      - { if: "ctx.collected.w8_mins != None and ctx.collected.w8_mins < 60",
          then: resolve_clap_reset_w8 }
    default: branch_check_week9

  - id: branch_check_week9
    type: branch
    rules:
      - { if: "ctx.collected.w9_mins != None and ctx.collected.w9_mins < 60",
          then: resolve_clap_reset_w9 }
    default: branch_check_week10

  - id: branch_check_week10
    type: branch
    rules:
      - { if: "ctx.collected.w10_mins != None and ctx.collected.w10_mins < 60",
          then: resolve_clap_reset_w10 }
    default: branch_check_week11

  - id: branch_check_week11
    type: branch
    rules:
      - { if: "ctx.collected.w11_mins != None and ctx.collected.w11_mins < 60",
          then: resolve_clap_reset_w11 }
    default: branch_check_week12

  - id: branch_check_week12
    type: branch
    rules:
      - { if: "ctx.collected.w12_mins != None and ctx.collected.w12_mins < 60",
          then: resolve_clap_reset_w12 }
    default: resolution_discrepancy

  - id: resolve_clap_reset_w1
    type: message
    prompt:
      text: |
        We checked your activity data for the week **{{ ctx.collected.w1_label }}** (most recent week).

        During that week, you spent **{{ ctx.collected.w1_mins | round(1) }} minutes** on the platform.

        The weekly clap is maintained only when you spend **at least 60 minutes per week** on iGOT Karmayogi. Since the time spent this week is below the 60-minute threshold, the **weekly clap count has been reset to zero**.

        ℹ️ Your weekly clap will start building again from the next week in which you spend 60 or more minutes on the platform.
    quick_replies:
      - { id: agree,    label: "✅ I understand" }
      - { id: disagree, label: "❌ I disagree — I spent more time" }
    disable_input: true
    on_reply:
      agree:    satisfied
      disagree: disagree_step1_ticket

  - id: resolve_clap_reset_w2
    type: message
    prompt:
      text: |
        We checked your activity data for the week **{{ ctx.collected.w2_label }}** .

