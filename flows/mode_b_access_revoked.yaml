
# =============================================================================
# MODE B — DETERMINISTIC WITH LLM FALLBACK
# =============================================================================
# Flow: Access Revoked (UC-01)
#
# Covers:
#   Path A — Transfer request already raised
#              → fetch org details → confirm org
#              → if correct: find MDO admin → share contact / YP fallback
#              → if wrong: guide to cancel and re-raise
#   Path B — No transfer request raised
#              → guide user to raise transfer request
#              → button disabled: guide to withdraw pending request
#              → can't find org: search org API → share name / YP fallback
#
# API calls:
#   POST /api/private/user/v1/search  — fetch user profile + transfer request
#   POST /api/org/v1/search           — fetch org name by rootOrgId / orgName
#   POST /api/private/user/v1/search  — fetch MDO admin by rootOrgId + role
# =============================================================================

flow_id: ACCESS_REVOKED
flow_type: deterministic_with_llm_fallback
version: 2

metadata:
  category:         profile
  menu_label:       "🔒 Access revoked"
  menu_group:       "Profile & User Management"
  menu_group_order: 1
  menu_order:       2
  classification:   Incident
  default_portal:   Learner Portal
  default_priority: P2
  default_severity: Sev 2

enabled_channels: [web]

classification:
  triggers:
    - "access has been revoked"
    - "organization no longer identifies you as a user"
    - "submit a transfer request"
    - "not my user"
    - "access revoked"

entry_node: fetch_transfer_status

imports:
  - _terminal
  - fragment: _yp_lookup

nodes:


  # ===========================================================================
  # 2. Verify Transfer Request Status (SOP Step 2.1: Private User Search API)
  # ===========================================================================
  - id: fetch_transfer_status
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/private/user/v1/search"
      body:
        request:
          filters:
            userId: "{{ ctx.user_id_hash }}"
          limit: 1
    response_mapping:
      # Check if user exists
      - { from: "$.response.count",                                       to: collected.user_found_count }
      # Keep full transfer object for robust pending-request detection
      - { from: "$.response.content[0].wfTransferRequest",                to: collected.wf_transfer_request }
      # Extract transfer request status fields
      - { from: "$.response.content[0].wfTransferRequest.wfId",           to: collected.wf_transfer_id }
      - { from: "$.response.content[0].wfTransferRequest.departmentName", to: collected.transfer_dept_name }
      - { from: "$.response.content[0].wfTransferRequest.rootOrgId",      to: collected.transfer_root_org_id }
      - { from: "$.response.content[0].wfTransferRequest.orgId",          to: collected.transfer_org_id }
      - { from: "$.response.content[0].wfTransferRequest.organisationId", to: collected.transfer_organisation_id }
      - { from: "$.response.content[0].wfTransferRequest.orgName",        to: collected.transfer_org_name }
      # Extract org details from user's organisations array (used as fallback when wfTransferRequest.rootOrgId is null)
      - { from: "$.response.content[0].organisations[0].orgName",          to: collected.profile_org_name }
      - { from: "$.response.content[0].organisations[0].organisationId",   to: collected.profile_root_org_id }
      # Extract current user profile details
      - { from: "$.response.content[0].channel",                          to: collected.user_channel }
      - { from: "$.response.content[0].channel",                          to: collected.org_channel }
      - { from: "$.response.content[0].rootOrgId",                        to: collected.root_org_id }
      - { from: "$.response.content[0].profileStatus",                    to: collected.profile_status }
    on_success: branch_on_transfer_status
    on_error:
      any: escalate_api_error

  - id: branch_on_transfer_status
    type: branch
    rules:
      - { if: "ctx.collected.user_found_count == 0", then: user_not_found_fallback }
      # SOP Step 2.2: If Transfer Request is Already Raised
      - { if: "ctx.collected.wf_transfer_id != None and ctx.collected.wf_transfer_id != ''",
          then: fetch_org_details }
    # SOP Step 4: If Transfer Request is NOT Raised
    default: guide_raise_transfer

  # Fetch organization details using org API (in case orgName is missing from transfer request)
  - id: fetch_org_details
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/org/v1/search"
      body:
        request:
          filters:
            "{{ 'id' if (ctx.collected.transfer_root_org_id or ctx.collected.transfer_org_id or ctx.collected.transfer_organisation_id) else 'orgName' }}": >
              {{
                (ctx.collected.transfer_root_org_id or ctx.collected.transfer_org_id or ctx.collected.transfer_organisation_id)
                if (ctx.collected.transfer_root_org_id or ctx.collected.transfer_org_id or ctx.collected.transfer_organisation_id)
                else (ctx.collected.transfer_org_name or ctx.collected.transfer_dept_name)
              }}
          limit: 1
    response_mapping:
      - { from: "$.response.content[0].orgName", to: collected.fetched_org_name }
      - { from: "$.response.content[0].ministryOrStateName", to: collected.fetched_ministry_name }
      - { from: "$.response.content[0].channel", to: collected.fetched_org_channel }
      - { from: "$.response.content[0].rootOrgId", to: collected.fetched_root_org_id }
    on_success: show_pending_transfer
    on_error:
      any: show_pending_transfer  # If org lookup fails, show with available info

  # ===========================================================================
  # 3. Path A: Transfer Request Already Raised (SOP Step 2.2)
  # ===========================================================================

  - id: user_not_found_fallback
    type: message
    prompt:
      text: |
        I'm sorry, I was unable to find an account matching your profile details.

    next: satisfied



  - id: show_pending_transfer
    type: message
    prompt:
      text: |
        ✅ **Transfer Request Found**

        We have reviewed your request and found that a transfer request has already been raised to the **{{ ctx.collected.transfer_org_name or ctx.collected.transfer_dept_name or ctx.collected.fetched_org_name or ctx.collected.profile_org_name or "organization" }}**.

        Kindly confirm whether this organization is correct.
    quick_replies:
      - { id: yes, label: "✅ Yes, that's correct" }
      - { id: no,  label: "❌ No, wrong organization" }
    disable_input: true
    on_reply:
      save_to: collected.org_confirmed
      # SOP Step 2.3: Once User Confirms Organization
      yes: fetch_mdo_admin_details
      # SOP Step 5.5: Cancel Request (If Required)
      no:  cancel_and_reraise_guide

  # SOP 2.3: Identify Concerned MDO Admin/Leader
  - id: fetch_mdo_admin_details
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/private/user/v1/search"
      body:
        request:
          filters:
            # Always search for MDO in the organisation the transfer request was raised to.
            # If the ID was missing in the transfer request, use the one we just fetched.
            rootOrgId: "{{ ctx.collected.fetched_root_org_id or ctx.collected.transfer_root_org_id or ctx.collected.transfer_org_id or ctx.collected.transfer_organisation_id or '' }}"
            organisations.roles: ["MDO_ADMIN"]
            status: 1
          limit: 1
    response_mapping:
      - { from: "$.response.count",                                               to: collected.mdo_admin_count }
      - { from: "$.response.content[0].profileDetails.personalDetails.firstname",    to: collected.mdo_admin_name }
      - { from: "$.response.content[0].profileDetails.personalDetails.primaryEmail", to: collected.mdo_admin_email }
    on_success: branch_on_mdo_found
    on_error:
      any: start_yp_lookup  # Fallback to YP lookup if API fails

  - id: branch_on_mdo_found
    type: branch
    rules:
      - { if: "ctx.collected.mdo_admin_count > 0", then: show_mdo_admin_details }
    # SOP Step 3: If No MDO Admin/Leader Exists — look up YP/SPOC
    default: start_yp_lookup

  - id: show_mdo_admin_details
    type: resolution
    prompt:
      text: |
        ✅ **MDO Admin Contact Information**

        We have identified the MDO Admin for the **{{ ctx.collected.transfer_org_name or ctx.collected.transfer_dept_name or ctx.collected.fetched_org_name or ctx.collected.profile_org_name }}** organization.
        
        **Contact Details:**
        - **Name:** {{ ctx.collected.mdo_admin_name or "MDO Admin" }}
        - **Email:** {{ ctx.collected.mdo_admin_email or "Contact the organization directly" }}
    steps:
      - "Connect with the MDO Admin using the contact information above."
      - "Request them to review and approve your transfer request."
      - "Your access will be restored once your request is approved."
    next: satisfied

  # SOP 5.5: Cancel and re-raise
  - id: cancel_and_reraise_guide
    type: resolution
    prompt:
      text: |
        **Cancel Current Request**

        Since the organization is incorrect, you need to cancel the current transfer request and raise a fresh one with the correct organization.
    steps:
      - "Log in to iGOT Karmayogi."
      - "Click on **Profile Icon** (Top Right Corner)."
      - "Click on **View Profile**."
      - "Click on **Cancel Transfer Request**."
      - "Once cancelled, click **Make Transfer Request** again."
      - "Select the **correct organization name** from the dropdown."
      - "Ensure all details (Group, Designation) are accurate."
      - "Click **Submit**. Your new request will be sent to the MDO Admin for approval."
    next: satisfied

  # ===========================================================================
  # 4. Path B: No Transfer Request Raised (SOP Step 4 & 5)
  # ===========================================================================
  - id: guide_raise_transfer
    type: resolution
    prompt:
      text: |
        📋 **Raise a Transfer Request**

        Your previous department's MDO has marked your profile as **'Not My User'**. Therefore, you are required to raise a **Transfer Request** to regain access to the platform.
    steps:
      - "Log in to iGOT Karmayogi."
      - "Click on **Profile Icon** (Top Right Corner)."
      - "Click on **View Profile**."
      - "Select **Make Transfer Request**."
      - "Select the **Correct Organization Name** from the dropdown."
      - "Choose **Group** and **Designation** (if applicable)."
      - "Ensure all details are accurate and click **Submit**."
      - "Your request will be sent to the concerned MDO Admin for approval."
      - "Access will be restored once the MDO Admin approves the request."
    follow_up:
      text: "Are you facing any issues while raising the request?"
      quick_replies:
        - { id: done,   label: "✅ I've submitted it" }
        - { id: greyed, label: "Button is disabled" }
        - { id: no_org, label: "🔍 Can't find my organisation" }
    on_reply:
      done: satisfied
      # SOP Step 6.1: Transfer Request Button Disabled
      greyed: guide_button_disabled
      # SOP Step 6.2: User Unable to Find Organization in Dropdown
      no_org: ask_org_tier
      
  # SOP 6.1: Resolution for disabled button
  - id: guide_button_disabled
    type: resolution
    prompt:
      text: |
        **"Make Transfer Request" Button is Disabled**

        This usually happens when you have a pending request under your **Primary Details** section.
    steps:
      - "Log in to iGOT Karmayogi."
      - "Go to **Profile** (Top Right Corner)."
      - "Open the **Primary Details** section."
      - "Click on **Withdraw Request** to cancel the pending request."
      - "Once withdrawn, the 'Make Transfer Request' option will become enabled again."
      - "Submit a fresh transfer request with the correct organization details."
    next: satisfied

  # Ask user if they are under Central Ministry or State Government
  - id: ask_org_tier
    type: message
    prompt:
      text: |
        To help locate your organization, please select your organization category:
    quick_replies:
      - { id: central, label: "🏛️ Central Government / Ministry" }
      - { id: state,   label: "🏙️ State Government" }
    on_reply:
      central: fetch_ministries_only
      state: fetch_states_only

  # Fetch Central Ministries
  - id: fetch_ministries_only
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/org/hierarchy/ministry/search"
      body:
        request: {}
    cache:
      ttl_seconds: 3600
    response_mapping:
      - from: "$.response.content"
        to: collected.parent_list
    on_success: branch_on_ministries_count
    on_error:
      any: escalate_api_error

  - id: branch_on_ministries_count
    type: branch
    rules:
      - { if: "not has(ctx.collected.parent_list)", then: start_yp_lookup }
    default: ministry_picker

  - id: ministry_picker
    type: collect
    prompt:
      text: "Please select your **Ministry / Department** from the list below:"
      title: "Select Ministry"
    field:
      name: collected.selected_parent_id
      type: select
    dynamic_options:
      source: context
      context_key: collected.parent_list
      response_mapping:
        id_field: id
        label_field: channel
        extra_fields:
          - { from: channel, to: collected.selected_parent_name }
      search: { enabled: true, placeholder: "Search ministry..." }
      empty_message: "No ministry found."
    on_empty: start_yp_lookup
    next: fetch_ministry_departments

  # Fetch departments for a selected Ministry (use levelZeroOrgId = selected ministry id)
  - id: fetch_ministry_departments
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/org/hierarchy/search"
      body:
        request:
          filters:
            status: 1
            levelZeroOrgId: "{{ ctx.collected.selected_parent_id }}"
          query: ""
          limit: 50
          offset: 0
          fields:
            - "identifier"
            - "orgName"
            - "description"
            - "orgHierarchyFrameworkId"
            - "orgHierarchyFrameworkStatus"
            - "sbOrgType"
            - "sbOrgSubType"
            - "channel"
    cache:
      ttl_seconds: 3600
    response_mapping:
      - from: "$.response.content"
        to: collected.filtered_orgs
        transform: append_others_org
    on_success: branch_on_orgs_count
    on_error:
      any: escalate_api_error



  # Fetch State Governments
  - id: fetch_states_only
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/org/hierarchy/state/search"
      body:
        request: {}
    cache:
      ttl_seconds: 3600
    response_mapping:
      - from: "$.response.content"
        to: collected.parent_list
    on_success: branch_on_states_count
    on_error:
      any: escalate_api_error

  - id: branch_on_states_count
    type: branch
    rules:
      - { if: "not has(ctx.collected.parent_list)", then: start_yp_lookup }
    default: state_picker

  - id: state_picker
    type: collect
    prompt:
      text: "Please select your **State Government** from the list below:"
      title: "Select State"
    field:
      name: collected.selected_parent_id
      type: select
    dynamic_options:
      source: context
      context_key: collected.parent_list
      response_mapping:
        id_field: id
        label_field: channel
        extra_fields:
          - { from: channel, to: collected.selected_parent_name }
      search: { enabled: true, placeholder: "Search state..." }
      empty_message: "No state found."
    on_empty: start_yp_lookup
    next: fetch_state_departments

  # Fetch departments for a selected State (use levelZeroOrgId = selected state id)
  - id: fetch_state_departments
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/org/hierarchy/search"
      body:
        request:
          filters:
            status: 1
            sbOrgType: "state"
            levelZeroOrgId: "{{ ctx.collected.selected_parent_id }}"
          query: ""
          limit: 50
          offset: 0
          fields:
            - "identifier"
            - "orgName"
            - "description"
            - "orgHierarchyFrameworkId"
            - "orgHierarchyFrameworkStatus"
            - "sbOrgType"
            - "sbOrgSubType"
            - "channel"
    cache:
      ttl_seconds: 3600
    response_mapping:
      - from: "$.response.content"
        to: collected.state_departments
    on_success: branch_on_state_depts_count
    on_error:
      any: escalate_api_error

  - id: branch_on_state_depts_count
    type: branch
    rules:
      - { if: "not has(ctx.collected.state_departments) or len(ctx.collected.state_departments) == 0", then: start_yp_lookup }
    default: state_dept_picker

  - id: state_dept_picker
    type: collect
    prompt:
      text: "Please select your **Department** from the list below:"
      title: "Select Department"
    field:
      name: collected.selected_dept_id
      type: select
    dynamic_options:
      source: context
      context_key: collected.state_departments
      response_mapping:
        id_field: identifier
        label_field: orgName
        extra_fields:
          - { from: orgName, to: collected.dropdown_dept_name }
      search: { enabled: true, placeholder: "Search departments..." }
      empty_message: "No departments found under this state."
    on_empty: start_yp_lookup
    next: fetch_state_orgs

  # Fetch final organizations under the selected state department
  - id: fetch_state_orgs
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/org/hierarchy/search"
      body:
        request:
          filters:
            status: 1
            sbOrgType: "state"
            levelZeroOrgId: "{{ ctx.collected.selected_dept_id }}"
          query: ""
          limit: 50
          offset: 0
          fields:
            - "identifier"
            - "orgName"
            - "description"
            - "orgHierarchyFrameworkId"
            - "orgHierarchyFrameworkStatus"
            - "sbOrgType"
            - "sbOrgSubType"
            - "channel"
    cache:
      ttl_seconds: 3600
    response_mapping:
      - from: "$.response.content"
        to: collected.filtered_orgs
        transform: append_others_org
    on_success: branch_on_orgs_count
    on_error:
      any: escalate_api_error

  - id: branch_on_orgs_count
    type: branch
    rules:
      # Fallback to YP lookup if no organizations found (missing field, empty list, or only "Others" option)
      - { if: "not has(ctx.collected.filtered_orgs) or len(ctx.collected.filtered_orgs) <= 1", then: start_yp_lookup }
    default: org_picker

  - id: org_picker
    type: collect
    prompt:
      text: |
        Please select your **Organization** from the list below:

        If you can't find your organisation in the list below, please select **Others** in the dropdown and we'll assist you further.
      title: "Select Organization"
    field:
      name: collected.selected_org_id
      type: select
    dynamic_options:
      source: context
      context_key: collected.filtered_orgs
      response_mapping:
        id_field: identifier
        label_field: orgName
        extra_fields:
          - { from: orgName, to: collected.dropdown_org_name }
      search: { enabled: true, placeholder: "Search organizations..." }
      empty_message: "No organizations found under this selection."
    on_empty: start_yp_lookup
    next: branch_on_org_selection

  - id: branch_on_org_selection
    type: branch
    rules:
      - { if: "ctx.collected.selected_org_id == 'other_org'", then: start_yp_lookup }
    default: confirm_org_selection

  - id: confirm_org_selection
    type: message
    prompt:
      text: |
        You selected: **{{ ctx.collected.dropdown_org_name }}** (under *{{ ctx.collected.selected_parent_name }}*).

        Is this correct?
    quick_replies:
      - { id: yes,  label: "✅ Yes, this is correct" }
      - { id: retry, label: "🔄 Select a different org" }
    on_reply:
      yes: share_exact_org_name_dropdown
      retry: ask_org_tier

  # Successful dropdown flow resolution
  - id: share_exact_org_name_dropdown
    type: resolution
    prompt:
      text: |
        ✅ **Organization Found!**

        We found your organization in the system.
    steps:
      - "When you raise your transfer request, select the exact organization name: **{{ ctx.collected.dropdown_org_name }}**"
      - "Go to your Profile → Make Transfer Request"
      - "Select the organization name exactly as shown above"
    next: satisfied


  - id: start_yp_lookup
    type: branch
    rules:
      - { if: "true", then: lookup_yp_org }
    default: lookup_yp_org

  - id: lookup_yp_org
    type: data_lookup
    service: yp_lookup
    key: "{{ ctx.collected.dropdown_org_name or ctx.collected.transfer_org_name or ctx.collected.fetched_org_name or 'NO_ORG' }}"
    response_mapping:
      - { from: name,      to: collected.yp_name }
      - { from: email,     to: collected.yp_email }
      - { from: mobile,    to: collected.yp_mobile }
      - { from: cc_email,  to: collected.yp_cc_email }
    on_success: yp_found_result
    on_error:
      any: lookup_yp_dept

  - id: lookup_yp_dept
    type: data_lookup
    service: yp_lookup
    key: "{{ ctx.collected.dropdown_dept_name or ctx.collected.transfer_dept_name or 'NO_DEPT' }}"
    response_mapping:
      - { from: name,      to: collected.yp_name }
      - { from: email,     to: collected.yp_email }
      - { from: mobile,    to: collected.yp_mobile }
      - { from: cc_email,  to: collected.yp_cc_email }
    on_success: yp_found_result
    on_error:
      any: lookup_yp_ministry

  - id: lookup_yp_ministry
    type: data_lookup
    service: yp_lookup
    key: "{{ ctx.collected.selected_parent_name or ctx.collected.fetched_ministry_name or ctx.collected.org_channel or ctx.collected.fetched_org_channel or 'NO_MINISTRY' }}"
    response_mapping:
      - { from: name,      to: collected.yp_name }
      - { from: email,     to: collected.yp_email }
      - { from: mobile,    to: collected.yp_mobile }
      - { from: cc_email,  to: collected.yp_cc_email }
    on_success: yp_found_result
    on_error:
      any: yp_not_found

  - id: yp_found_result
    type: branch
    rules:
      - { if: "ctx.collected.wf_transfer_id != None and ctx.collected.wf_transfer_id != ''", then: yp_found_transfer_raised }
    default: yp_found_org_not_found

  - id: yp_found_transfer_raised
    type: resolution
    prompt:
      text: |
        ✅ **SPOC Details Found**

        Please reach out to the concerned YP/SPOC contact below:

        - **Name:** {{ ctx.collected.yp_name or "YP Contact" }}
        - **Email:** {{ ctx.collected.yp_email or "N/A" }}
        - **Mobile:** {{ ctx.collected.yp_mobile or "N/A" }}
    steps:
      - "Coordinate with the SPOC for the creation of an MDO Leader/Admin."
      - "Request approval-related support for your transfer request."
    next: satisfied

  - id: yp_found_org_not_found
    type: resolution
    prompt:
      text: |
        ✅ **SPOC Details Found**

        Please reach out to the concerned YP/SPOC contact below:

        - **Name:** {{ ctx.collected.yp_name or "YP Contact" }}
        - **Email:** {{ ctx.collected.yp_email or "N/A" }}
        - **Mobile:** {{ ctx.collected.yp_mobile or "N/A" }}
    steps:
      - "Connect with the shared SPOC using the details above."
      - "Request the creation of your organization."
      - "Raise a transfer request post-organization creation."
    next: satisfied

  - id: yp_not_found
    type: message
    prompt:
      text: |
        We could not find the SPOC details for your organization in our current records.
    next: satisfied

  # ===========================================================================
  # 5. Escalation & Terminal
  # ===========================================================================
  - id: escalate_api_error
    type: message
    prompt:
      text: |
        I'm sorry, I encountered a technical issue while checking your profile and can't proceed with the automated steps right now.

        Please try again after some time. Thank you for your patience.
    next: satisfied



  - id: satisfied
    type: end
    outcome: self_served
    prompt:
      text: |
        Glad I could help.