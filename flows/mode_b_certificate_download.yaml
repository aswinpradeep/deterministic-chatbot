# =============================================================================
# MODE B — DETERMINISTIC + LLM TICKET TAIL
# =============================================================================
# Flow: Certificate Download Issue (UC-02 + UC-03)
#
# Covers:
#   C1 — Certificate not generated / not received
#   C3 — Incorrect name on certificate
#
# Mode B pattern:
#   1. Deterministic SOP walks user through self-service resolution
#   2. If issue persists → transfer_llm (auto_raise:true) generates ticket
#      summary from collected context → Zoho ticket created automatically
#   3. Session ends with outcome: ticket_raised
#
# APIs used:
#   POST /api/course/private/v4/user/enrollment/list/{user_id}
#   POST /api/content/v1/search
#   GET  /api/user/private/v1/read/{user_id}
#   PATCH /api/user/private/v1/update
# =============================================================================

flow_id: CERTIFICATE_DOWNLOAD
flow_type: deterministic_with_llm_fallback
version: 2

metadata:
  category:         course
  menu_label:       "🎓 Certificate issue"
  menu_group:       "Content Related Issue"
  menu_group_order: 2
  menu_order:       1
  classification:   Query
  default_portal:   Learner Portal
  default_priority: P4
  default_severity: Sev 4

enabled_channels: [web]

classification:
  triggers:
    - "certificate not generated"
    - "certificate not received"
    - "certificate not visible"
    - "can't download certificate"
    - "cert missing on dashboard"
    - "where is my certificate"
    - "certificate not issued"
    - "incorrect name on certificate"
    - "wrong name on certificate"

entry_node: ask_certificate_issue

imports:
  - _terminal
  - fragment: _zoho_ticket
    with:
      cf_category:     course
      cf_sub_category: certificate_issue
      cf_flow_id:      CERTIFICATE_DOWNLOAD
  - fragment: _enrollment_picker
    with:
      node_id:       c1_pick_course
      prompt_text:   "Please select the course for which you have not received the certificate."
      title:         "Select Course"
      field_name:    c1_course_id
      field_prefix:  "c1_"
      next:          c1_read_course_content
      on_empty:      no_courses_found_cert

nodes:

  # ===========================================================================
  # 1. Identify which certificate issue the user is facing
  # ===========================================================================
  - id: ask_certificate_issue
    type: message
    prompt:
      text:  "What's the issue with your certificate?"
      voice: "Tell me what's wrong with your certificate. Press 1 or 2."
    quick_replies:
      - { id: C1, label: "Certificate not generated / not received", icon: "🎓" }
      - { id: C3, label: "Incorrect name on certificate", icon: "✏️" }
    disable_input: true
    on_reply:
      save_to: collected.sub_scenario
      next:    branch_on_issue

  - id: branch_on_issue
    type: branch
    rules:
      - { if: "ctx.collected.sub_scenario == 'C1'", then: c1_pick_course }
      - { if: "ctx.collected.sub_scenario == 'C3'", then: c3_fetch_user_profile }
    default: resolution_generic

  # ===========================================================================
  # C1: Certificate Not Generated / Not Received (UC-03)
  # ===========================================================================

  # c1_pick_course — injected from _shared/_enrollment_picker.yaml (on_empty: no_courses_found_cert)

  # c1_check_enrollment removed — all fields now captured by c1_pick_course extra_fields

  # Route based on enrollment status (0=not started, 1=in-progress, 2=completed)
  - id: c1_read_course_content
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/content/v1/read/{{ ctx.collected.c1_course_id }}"
    response_mapping:
      - { from: "$.content.leafNodes",
          to:   collected.c1_incomplete_ids,
          transform: diff_leaf_nodes,
          transform_ctx_key: collected.c1_completed_ids }
      - { from: "$.content.primaryCategory",
          to:   collected.c1_primary_category }
    on_success: c1_branch_enrollment
    on_error:
      any: c1_branch_enrollment
    timeout_ms: 8000

  - id: c1_branch_enrollment
    type: branch
    rules:
      - { if: "ctx.collected.c1_course_name == None or ctx.collected.c1_course_name == ''",
          then: c1_no_enrollment_found }
      - { if: "ctx.collected.c1_enrollment_status == 2",
          then: c1_branch_certificate_issued }
      - { if: "ctx.collected.c1_enrollment_status == 1",
          then: c1_branch_on_leaf_ids_available }
    default: c1_branch_not_started

  - id: c1_branch_not_started
    type: branch
    rules:
      - { if: "'program' in lower(str(ctx.collected.c1_primary_category))", then: c1_not_started_program }
    default: c1_not_started

  - id: c1_no_enrollment_found
    type: message
    prompt:
      text: "I couldn't find an enrolment for the selected course. Please pick the correct course from the list."
    next: c1_pick_course

  - id: c1_not_started
    type: message
    prompt:
      text: |
        Your course **{{ ctx.collected.c1_course_name }}** is showing as 'not started' with 0% completion. A certificate is only generated upon 100% completion.

        **Steps to complete the course:**

        1. Go to **Profile** → **My Learning** → **In Progress**
        2. Locate and select the course
        3. Click **Resume**
        4. Expand each module (click the **+** icon)
        5. Complete all items without a blue tick mark
        6. Once all modules show a blue tick, the certificate generates within 24 hours
    next: satisfied

  # Course completed — check timing
  - id: c1_not_started_program
    type: message
    prompt:
      text: |
        Your program **{{ ctx.collected.c1_course_name }}** is showing as 'not started' with 0% completion. A certificate is only generated upon 100% completion.

        **Steps to complete the program:**

        1. Go to **Profile** → **My Learning** → **In Progress**
        2. Locate and select the program
        3. Click **Resume**
        4. Expand each module (click the **+** icon)
        5. Complete all items without a blue tick mark
        6. Once all modules show a blue tick, the certificate generates within 24 hours
    next: satisfied

  # Course completed — check timing
  - id: c1_branch_certificate_issued
    type: branch
    rules:
      # Guard: if completedOn was null, treat as > 24h (same UX — cert should be available)
      - { if: "ctx.collected.c1_completed_on_iso == None or hours_since(ctx.collected.c1_completed_on_iso) > 24",
          then: c1_branch_certificate_available }
    default: c1_branch_wait_24h

  - id: c1_branch_certificate_available
    type: branch
    rules:
      - { if: "'program' in lower(str(ctx.collected.c1_primary_category))", then: c1_certificate_available_program }
    default: c1_certificate_available

  - id: c1_branch_wait_24h
    type: branch
    rules:
      - { if: "'program' in lower(str(ctx.collected.c1_primary_category))", then: c1_wait_24h_program }
    default: c1_wait_24h

  - id: c1_certificate_available
    type: message
    prompt:
      text: |
        We checked, and found that the course **{{ ctx.collected.c1_course_name }}** has been successfully completed and more than 24 hours have passed since completion.

        Please download the certificate again by following the steps below:

        1. Log in to the **iGOT Karmayogi Portal**.
        2. Go to **Profile**.
        3. Click on **My Learning**.
        4. Search and select **{{ ctx.collected.c1_course_name }}**.
        5. Open the course details page.
        6. Navigate to the **About** section.
        7. Click on **Download Certificate**.
    next: satisfied

  - id: c1_certificate_available_program
    type: message
    prompt:
      text: |
        We checked, and found that the program **{{ ctx.collected.c1_course_name }}** has been successfully completed and more than 24 hours have passed since completion.

        Please download the certificate again by following the steps below:

        1. Log in to the **iGOT Karmayogi Portal**.
        2. Go to **Profile**.
        3. Click on **My Learning**.
        4. Search and select **{{ ctx.collected.c1_course_name }}**.
        5. Open the program details page.
        6. Navigate to the **About** section.
        7. Click on **Download Certificate**.
    next: satisfied

  - id: c1_wait_24h
    type: message
    prompt:
      text: "Certificate generation may take up to **24 hours** after successful course completion. Please wait until 24 hours have elapsed from the completion time and then try downloading the certificate again."
    next: satisfied

  # --------------------------------------------------------------------------
  # Step 2 — Incomplete Resource Lookup (course in-progress)
  # --------------------------------------------------------------------------
  - id: c1_wait_24h_program
    type: message
    prompt:
      text: "Certificate generation may take up to **24 hours** after successful program completion. Please wait until 24 hours have elapsed from the completion time and then try downloading the certificate again."
    next: satisfied

  # --------------------------------------------------------------------------
  # Step 2 — Incomplete Resource Lookup (course in-progress)
  # --------------------------------------------------------------------------
  - id: c1_branch_on_leaf_ids_available
    type: branch
    rules:
      - { if: "len(ctx.collected.c1_incomplete_ids) == 0",
          then: c1_branch_wait_24h }
    default: c1_fetch_incomplete_resources
  - id: c1_fetch_incomplete_resources
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/content/v1/search"
      body:
        request:
          filters:
            identifier: "{{ ctx.collected.c1_incomplete_ids }}"
            status:
              - "Live"
              - "Review"
              - "Draft"
              - "Retired"
          isSecureSettingsDisabled: true
          sort_by:
            createdOn: "desc"
          fields: ["identifier", "name", "mimeType", "status", "duration"]
          facets: ["status"]
          limit: 1000
    response_mapping:
      - { from: "$.content[0].name",     to: collected.c1_incomplete_resource_name }
      - { from: "$.content[*].name",     to: collected.c1_incomplete_resource_names }
      - { from: "$.content[*].mimeType", to: collected.c1_has_scorm, transform: detect_scorm }
    on_success: c1_branch_scorm
    on_error:
      any: c1_branch_in_progress
    timeout_ms: 8000

  - id: c1_branch_scorm
    type: branch
    rules:
      - { if: "ctx.collected.c1_has_scorm == true", then: c1_branch_in_progress_scorm }
    default: c1_branch_in_progress

  - id: c1_branch_in_progress_scorm
    type: branch
    rules:
      - { if: "'program' in lower(str(ctx.collected.c1_primary_category))", then: c1_in_progress_scorm_program }
    default: c1_in_progress_scorm

  - id: c1_branch_in_progress
    type: branch
    rules:
      - { if: "'program' in lower(str(ctx.collected.c1_primary_category))", then: c1_in_progress_program }
    default: c1_in_progress

  - id: c1_in_progress_scorm
    type: message
    prompt:
      text: |
        We checked, and found that the course **{{ ctx.collected.c1_course_name }}** is still in progress and has not yet been completed.

        The resource **"{{ ctx.collected.c1_incomplete_resource_name }}"** is pending completion. This resource is in **SCORM format** — it must be completed within the platform in one continuous session.

        **Steps to identify and complete pending resources:**

        1. Go to **Profile**.
        2. Click on **My Learning**.
        3. Open the **In Progress** section under *Contents*.
        4. Locate and select **{{ ctx.collected.c1_course_name }}**.
        5. Click **Resume**.
        6. Expand each module by clicking the **plus (+) icon**.
        7. Check for content items that do not have a blue tick mark.
        8. Open resources **without a blue tick** — complete them fully without closing the tab.
        9. SCORM reports completion only when you reach the end or pass the threshold.
        10. Ensure all modules and content items display a blue tick mark.
        11. Continue until the course completion reaches **100%**.

        **Note:** SCORM resources require a stable internet connection and cannot be completed offline.

        Please complete all pending resources and recheck certificate availability after successful course completion.
    next: satisfied

  - id: c1_in_progress_scorm_program
    type: message
    prompt:
      text: |
        We checked, and found that the program **{{ ctx.collected.c1_course_name }}** is still in progress and has not yet been completed.

        The resource **"{{ ctx.collected.c1_incomplete_resource_name }}"** is pending completion. This resource is in **SCORM format** — it must be completed within the platform in one continuous session.

        **Steps to identify and complete pending resources:**

        1. Go to **Profile**.
        2. Click on **My Learning**.
        3. Open the **In Progress** section under *Contents*.
        4. Locate and select **{{ ctx.collected.c1_course_name }}**.
        5. Click **Resume**.
        6. Expand each module by clicking the **plus (+) icon**.
        7. Check for content items that do not have a blue tick mark.
        8. Open resources **without a blue tick** — complete them fully without closing the tab.
        9. SCORM reports completion only when you reach the end or pass the threshold.
        10. Ensure all modules and content items display a blue tick mark.
        11. Continue until the program completion reaches **100%**.

        **Note:** SCORM resources require a stable internet connection and cannot be completed offline.

        Please complete all pending resources and recheck certificate availability after successful program completion.
    next: satisfied

  - id: c1_in_progress
    type: message
    prompt:
      text: |
        We checked, and found that the course **{{ ctx.collected.c1_course_name }}** is still in progress and has not yet been completed.

        The following resource is pending completion: **"{{ ctx.collected.c1_incomplete_resource_name }}"**

        **Steps to identify and complete pending resources:**

        1. Go to **Profile**.
        2. Click on **My Learning**.
        3. Open the **In Progress** section under *Contents*.
        4. Locate and select **{{ ctx.collected.c1_course_name }}**.
        5. Click **Resume**.
        6. Expand each module by clicking the **plus (+) icon**.
        7. Check for content items that do not have a blue tick mark.
        8. Ensure all modules and content items display a blue tick mark.
        9. Resume and complete the pending videos, assessments, or content items.
        10. Continue until the course completion reaches **100%**.

        Please complete all pending resources and recheck certificate availability after successful course completion.
    next: satisfied

  # --------------------------------------------------------------------------
  # Satisfaction check — if unresolved, auto-raise ticket
  # --------------------------------------------------------------------------
  - id: c1_in_progress_program
    type: message
    prompt:
      text: |
        We checked, and found that the program **{{ ctx.collected.c1_course_name }}** is still in progress and has not yet been completed.

        The following resource is pending completion: **"{{ ctx.collected.c1_incomplete_resource_name }}"**

        **Steps to identify and complete pending resources:**

        1. Go to **Profile**.
        2. Click on **My Learning**.
        3. Open the **In Progress** section under *Contents*.
        4. Locate and select **{{ ctx.collected.c1_course_name }}**.
        5. Click **Resume**.
        6. Expand each module by clicking the **plus (+) icon**.
        7. Check for content items that do not have a blue tick mark.
        8. Ensure all modules and content items display a blue tick mark.
        9. Resume and complete the pending videos, assessments, or content items.
        10. Continue until the program completion reaches **100%**.

        Please complete all pending resources and recheck certificate availability after successful program completion.
    next: satisfied

  # ===========================================================================
  # C3: Incorrect Name on Certificate (UC-02)
  # ===========================================================================

  # Step 1.1 — Fetch User Details
  - id: c3_fetch_user_profile
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/user/private/v1/read/{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.response.firstName",                                 to: collected.c3_first_name }
      - { from: "$.response.lastName",                                  to: collected.c3_last_name }
      - { from: "$.response.profileDetails.personalDetails.firstname",  to: collected.c3_pd_firstname }
      - { from: "$.response.profileDetails.personalDetails.surname",    to: collected.c3_pd_surname }
    on_success: c3_confirm_name
    on_error:
      any: resolution_generic
    timeout_ms: 5000

  # Step 1.2 - Confirm User's Name
  - id: c3_confirm_name
    type: message
    prompt:
      text: |
        We checked, and found that your current profile name is:

        Name: **{{ ctx.collected.c3_first_name or ctx.collected.c3_pd_firstname }} {{ ctx.collected.c3_last_name or ctx.collected.c3_pd_surname }}**

        Could you confirm whether this name is correct?
    quick_replies:
      - { id: yes, label: "✅ Yes, it is correct" }
      - { id: no,  label: "❌ No, it is incorrect" }
    disable_input: true
    on_reply:
      save_to: collected.c3_is_name_correct
      next: c3_branch_is_name_correct

  - id: c3_branch_is_name_correct
    type: branch
    rules:
      - { if: "ctx.collected.c3_is_name_correct == 'yes'", then: c3_name_correct }
    default: c3_name_incorrect

  # Step 2 - Name is Correct
  - id: c3_name_correct
    type: message
    prompt:
      text: |
        Since your profile name is correct, please re-download the certificate by following the steps below.

        **Steps to Re-download the Certificate:**
        1. Log in to your iGOT Karmayogi account.
        2. Go to **Profile**.
        3. Open the **Certificates** section.
        4. Locate the required certificate.
        5. Click on **Download Certificate**.
        6. Verify whether the downloaded certificate displays the correct name.
    next: satisfied

  # Step 3 - Name is Incorrect
  - id: c3_name_incorrect
    type: message
    prompt:
      text: |
        The name displayed on the certificate is generated based on the name available in your profile.

        Would you like to update your profile name?
    quick_replies:
      - { id: yes, label: "✅ Yes" }
      - { id: no,  label: "❌ No" }
    disable_input: true
    on_reply:
      save_to: collected.c3_wants_to_update
      next: c3_branch_update_profile

  - id: c3_branch_update_profile
    type: branch
    rules:
      - { if: "ctx.collected.c3_wants_to_update == 'yes'", then: c3_guide_update_profile }
    default: c3_no_update

  # Step 3.2 - Confirms Yes
  - id: c3_guide_update_profile
    type: message
    prompt:
      text: |
        Please follow the below steps to update your profile name:

        1. Log in to your iGOT Karmayogi account.
        2. Go to **Profile**.
        3. Click on **Edit Profile**.
        4. Update the **Name** field with the correct details.
        5. Save the changes.

        Once the profile has been updated successfully:
        1. Go to **Profile**.
        2. Open the **Certificates** section.
        3. Locate the required certificate.
        4. Click on **Download Certificate**.
        5. Verify whether the updated name is reflected in the downloaded certificate.
    next: satisfied

  # Step 3.3 - Confirms No
  - id: c3_no_update
    type: message
    prompt:
      text: |
        No problem.

        If you decide to update your profile name in the future, you can follow the above steps and re-download the certificate.
    next: satisfied

  # ===========================================================================
  # Generic resolution (catch-all for unexpected paths)
  # ===========================================================================
  - id: resolution_generic
    type: resolution
    prompt:
      text: "Let me give you some general guidance for certificate issues:"
    steps:
      - "Log out of iGOT and log back in."
      - "Try using a different browser or clearing your browser cache."
      - "Wait **24 hours** after course completion — certificate generation can take time."
      - "Check the **Completed** tab under **My Learning** → **Courses / Events**."
    follow_up:
      text: "Did any of these steps help?"
      quick_replies:
        - { id: yes, label: "✅ Yes, resolved" }
        - { id: no,  label: "❌ Still not working" }
    on_reply:
      yes: satisfied
      no:  generic_step1_ticket

  - id: generic_step1_ticket
    type: ticket_confirm
    prompt:
      text: |
        **Issue Identified:** Certificate Issue

        **Summary of Request:**
        You reported that your certificate issue could not be resolved through standard troubleshooting steps. You would like us to investigate this issue further.
        
        • **Course:** {{ ctx.collected.c1_course_name or 'Selected course' }}

        Please review the details above and confirm whether they are correct.
    on_confirm: generic_auto_ticket
    on_cancel: satisfied

  - id: generic_auto_ticket
    type: transfer_llm
    auto_raise: silent
    llm_context:
      include_messages:  true
      include_collected: true
    llm_directives:
      objective: |
        User has a certificate issue that could not be resolved through self-service.
        Generate a concise Zoho support ticket.
        Subject: "Certificate Issue — iGOT Support Needed"
        Description: summarise the issue type (sub_scenario if available), course details, and what was tried.
      priority_override: P4
    on_complete: confirm_ticket
    on_restart: ask_certificate_issue

  - id: no_courses_found_cert
    type: message
    prompt:
      text: |
        You do not have any enrolled courses or programs with In-Progress or Completed status.

        Please enrol in a course on the iGOT Karmayogi portal and try again.
    next: satisfied
