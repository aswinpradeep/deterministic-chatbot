# =============================================================================
# MODE B — DETERMINISTIC FLOW
# =============================================================================
# Flow: User Unable to Find a Course / Moderated Course / External Course /
#       Event / Unable to Enroll in a Course
#
# Covers:
#   PATH A — Marketplace / external course (Coursera, Harvard, etc.)
#             Pure guidance — no active enrollment cycle. No API needed.
#   PATH B — Regular iGOT course or program
#             User profile → Composite Search → Access Settings → MDO/YP contact
#   PATH C — Event on iGOT
#             Composite Search → Access Settings → MDO/YP contact
#
# APIs used:
#   GET  /api/user/private/v1/read/{user_id}  (karmayogi — user profile)
#   POST /api/composite/v4/search             (karmayogi — course/event search)
#   GET  /api/accessSettings/read/{id}        (cbp_api   — restriction check)
#   POST /api/user/v1/search                  (karmayogi — MDO admin lookup)
#   data_lookup: yp_lookup                    (local Excel — YP/AM fallback)
#
# KNOWN GAPS:
#   [GAP-1] Semantic ≥90% match (SOP §4.2) approximated with keyword search;
#           no embedding similarity available in YAML.
#   [GAP-2] Multiple-results eligibility loop (SOP §10): only the top result is
#           fully processed; user can retry with a refined name.
#   [GAP-3] Course/event hyperlink URL pattern not confirmed by API team.
#           Placeholder: https://portal.uat.karmayogibharat.net/app/toc/{id}/overview
#   [GAP-4] RESOLVED: Access Settings API userGroups criteria are now compared against
#           the user's profileDetails.professionalDetails via the check_user_eligibility
#           transform (criteriaKey "group", "designation", etc. matched field-by-field).
# =============================================================================

flow_id: FIND_COURSE
flow_type: deterministic_with_llm_fallback
version: 1

metadata:
  category:         course
  menu_label:       "🔍 Can't find a course or event"
  menu_group:       "Content Related Issue"
  menu_group_order: 2
  menu_order:       5
  classification:   Service Request
  default_priority: P3
  default_severity: Sev 3
  default_portal:   Learner Portal

enabled_channels: [web]

classification:
  triggers:
    - "can't find course"
    - "course not available"
    - "unable to find course"
    - "unable to enroll"
    - "can't enroll"
    - "course not found"
    - "event not found"
    - "can't find event"
    - "moderated course"
    - "external course"
    - "coursera"
    - "marketplace course"
    - "course search"
    - "find a course"

entry_node: ask_marketplace_question

imports:
  - _terminal
  - _karmayogi_user
  - _mdo_admin_lookup
  - _yp_lookup
  - fragment: _zoho_ticket
    with:
      cf_category:     course
      cf_sub_category: find_course
      cf_flow_id:      FIND_COURSE

nodes:

  # ===========================================================================
  # STEP 1 — Identify whether the user is looking for a marketplace/external course
  # ===========================================================================
  - id: ask_marketplace_question
    type: message
    prompt:
      text: |
        Could you confirm whether you're looking for a marketplace or external course, such as one offered through Coursera or Harvard?
    quick_replies:
      - { id: yes, label: "Yes" }
      - { id: no,  label: "No" }
    disable_input: true
    on_reply:
      save_to: collected.is_marketplace
      yes: marketplace_guidance
      no:  ask_content_type

  # ===========================================================================
  # PATH A — Marketplace / external course
  # No API call needed. Pure guidance. No ticket.
  # ===========================================================================
  - id: marketplace_guidance
    type: resolution
    prompt:
      text: |
        Thanks for confirming that you're looking for a marketplace or external course, such as those offered through Coursera or Harvard.

        At the moment, there's no active enrollment cycle for marketplace/external courses this year.

        We appreciate your interest in learning through the platform. Please wait until the next enrollment cycle is announced — you'll be notified as soon as it opens.
    steps: []
    next: satisfied

  # ===========================================================================
  # STEP 3 — Identify whether the user is looking for a course or event
  # ===========================================================================
  - id: ask_content_type
    type: message
    prompt:
      text: |
        Could you let me know what you're looking for?
    quick_replies:
      - { id: course, label: "📘 A Course / Program" }
      - { id: event,  label: "📅 An Event" }
    disable_input: true
    on_reply:
      save_to: collected.content_type
      course: fetch_user_profile
      event:  ask_event_name

  # ===========================================================================
  # PATH B — COURSE / PROGRAM FLOW
  # ===========================================================================

  # fetch_user_profile — provided by _karmayogi_user fragment
  # Stores: collected.first_name, collected.root_org_id, collected.org_channel
  # on_success → diagnose_missing_fields (defined below)
  # on_error   → escalate_api_error (defined below)

  - id: diagnose_missing_fields
    type: message
    prompt:
      text: |
        Could you share the exact name of the course or program you're looking for?
    next: ask_course_name

  - id: escalate_api_error
    type: message
    prompt:
      text: |
        **Profile Details Unavailable**

        We're unable to fetch your profile details right now. Please try again in a little while.
    quick_replies:
      - { id: retry, label: "🔄 Try again" }
      - { id: done,  label: "✅ Exit" }
    on_reply:
      retry: fetch_user_profile
      done:  satisfied

  # STEP 4.1 — Collect course name
  - id: ask_course_name
    type: collect
    prompt:
      text: ""   # preceded by diagnose_missing_fields message
    field:
      name:        collected.search_term
      type:        text
      placeholder: "e.g. Foundational Course for New Recruits"
    next: composite_search

  # STEP 4.2 — Composite Content Search
  # POST /api/composite/v4/search
  # Searches all statuses so DRAFT/REVIEW/RETIRED results surface with correct status message.
  # Also extracts secureSettings to detect moderated courses and evaluate metadata eligibility
  # in a single pass (avoids a separate round-trip later).
  - id: composite_search
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/composite/v4/search"
      body:
        request:
          query: "{{ ctx.collected.search_term }}"
          filters:
            primaryCategory: ["Course", "Program"]
            status: ["Live", "Review", "Draft", "Retired"]
          sort_by:
            createdOn: "desc"
          limit: 10
    response_mapping:
      - { from: "$.count",                    to: collected.composite_count }
      - { from: "$.content[0].name",          to: collected.course_name_found }
      - { from: "$.content[0].status",        to: collected.course_status }
      - { from: "$.content[0].identifier",    to: collected.course_id }
      # Moderated course: capture raw secureSettings for display/debug
      - { from: "$.content[0].secureSettings", to: collected.course_secure_settings }
      # Evaluate metadata eligibility immediately using the transform.
      # Result (True/False) stored as collected.metadata_eligible.
      # transform_ctx_key passes collected.user_eligibility_ctx built by _karmayogi_user.
      - { from: "$.content[0].secureSettings",
          to: collected.metadata_eligible,
          transform: check_secure_settings_eligibility,
          transform_ctx_key: collected.user_eligibility_ctx }
    on_success: branch_composite_results
    on_error:
      any: search_api_error
    timeout_ms: 8000

  - id: branch_composite_results
    type: branch
    rules:
      # STEP 5 — No result found
      - { if: "ctx.collected.course_name_found == None or ctx.collected.composite_count == 0",
          then: course_not_found }
      # STEP 8 — Course is RETIRED
      - { if: "ctx.collected.course_status == 'Retired'",
          then: show_course_retired }
      # STEP 9 — Course is DRAFT, REVIEW, or any other non-Live status
      - { if: "ctx.collected.course_status != 'Live'",
          then: show_course_unavailable }
      # STEP 11 — Moderated course detected (secureSettings present in search result)
      #            Route to dual-gate eligibility sub-path before showing the link
      - { if: "ctx.collected.course_secure_settings != None",
          then: branch_moderated_meta }
      # STEP 10 — Multiple non-moderated results; access check on top result
      - { if: "ctx.collected.composite_count > 1",
          then: fetch_access_settings_multi }
    default: fetch_access_settings

  # ===========================================================================
  # STEP 11 — Moderated course eligibility — GATE 1: Metadata (secureSettings)
  # ===========================================================================
  # metadata_eligible was already computed by composite_search using the
  # check_secure_settings_eligibility transform on content[0].secureSettings.
  # This branch simply routes on the pre-computed result.
  - id: branch_moderated_meta
    type: branch
    rules:
      # STEP 11.1.3 — Metadata eligibility failed → not eligible → escalate directly to MDO lookup
      # (show_mdo_contact / yp_found_result already carry the full SOP §13 message)
      - { if: "ctx.collected.metadata_eligible == False", then: lookup_mdo_admin }
    default: fetch_access_settings_moderated

  # ===========================================================================
  # STEP 11.1.2 — Moderated course eligibility — GATE 2: Access Settings API
  # GET /api/accessSettings/read/{course_id}
  # Same endpoint as regular courses but uses a separate collected key so we
  # do not overwrite access_control_eligible used by the regular path.
  # ===========================================================================
  - id: fetch_access_settings_moderated
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/accessSettings/read/{{ ctx.collected.course_id }}"
      headers:
        wid: "{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.accessControl.userGroups",
          to: collected.moderated_access_eligible,
          transform: check_user_eligibility,
          transform_ctx_key: collected.user_eligibility_ctx }
    on_success: branch_moderated_access
    on_error:
      # 404 / no config → Access Settings not configured; metadata check already passed
      # SOP §14 Note: treat as publicly accessible → eligible (metadata was the only gate)
      not_found: show_moderated_course_eligible
      any:       show_moderated_course_eligible
    timeout_ms: 5000

  # STEP 11.1.3 — Final eligibility decision for moderated course
  - id: branch_moderated_access
    type: branch
    rules:
      # Access Settings criteria present but user does NOT match → not eligible → escalate
      # Route directly to MDO lookup; show_mdo_contact carries the full SOP §13 message
      - { if: "ctx.collected.moderated_access_eligible == False",
          then: lookup_mdo_admin }
    default: show_moderated_course_eligible

  # ===========================================================================
  # STEP 12 — User IS eligible for the moderated course
  # SOP §12.1 — Share course details and hyperlink
  # ===========================================================================
  - id: show_moderated_course_eligible
    type: resolution
    prompt:
      text: |
        Good news — you're eligible for this moderated course.

        📘 **Course Name:** {{ ctx.collected.course_name_found }}

        Please use the link below to access it and complete your enrollment.
    steps: []
    action_button:
      label: "🔗 Open Course"
      url: "{{ env.KARMAYOGI_PORTAL_BASE_URL }}/app/toc/{{ ctx.collected.course_id }}/overview"
    next: satisfied

  # ===========================================================================
  # STEP 13 — User is NOT eligible for the moderated course
  # SOP §13.1 — Fetch MDO details; §13.2 — fallback to YP/AM
  # Both branch_moderated_meta and branch_moderated_access route directly to
  # lookup_mdo_admin. The downstream show_mdo_contact / yp_found_result nodes
  # already carry the full SOP §13 messaging — no intermediate message needed.
  # (Removed moderated_not_eligible_fetch_mdo — it duplicated the eligibility message.)
  # ===========================================================================

  # ===========================================================================
  # STEP 6 / STEP 7 — Access Settings check for single Live NON-moderated result
  # GET /api/accessSettings/read/{course_id}  (karmayogi — same portal base URL)
  # Response: result.accessControl.userGroups[].userGroupCriteriaList[]
  # Eligibility: user's profile fields compared against each criterion
  # ===========================================================================
  - id: fetch_access_settings
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/accessSettings/read/{{ ctx.collected.course_id }}"
      headers:
        wid: "{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.accessControl.userGroups",
          to: collected.access_control_eligible,
          transform: check_user_eligibility,
          transform_ctx_key: collected.user_eligibility_ctx }
    on_success: branch_on_access
    on_error:
      # No access config or 404 → treat as publicly accessible (SOP §6 / §14 Note)
      not_found: show_course_public
      any:       show_course_public
    timeout_ms: 5000

  - id: branch_on_access
    type: branch
    rules:
      # STEP 11 — User does NOT meet access criteria → escalate to MDO
      - { if: "ctx.collected.access_control_eligible == False", then: lookup_mdo_admin }
    default: show_course_public

  # STEP 7.1.1 — Course is LIVE and user is eligible (no restriction)
  # [GAP-3] URL pattern not confirmed — using portal TOC path as placeholder
  - id: show_course_public
    type: resolution
    prompt:
      text: |
        We found the course you were looking for on the platform.

        📘 **Course Name:** {{ ctx.collected.course_name_found }}

        Please use the link below to go to the course and proceed with enrollment.
    steps: []
    action_button:
      label: "🔗 Open Course"
      url: "{{ env.KARMAYOGI_PORTAL_BASE_URL }}/app/toc/{{ ctx.collected.course_id }}/overview"
    follow_up:
      text: "Were you able to find and enroll in the course?"
      quick_replies:
        - { id: yes, label: "✅ Yes, found it" }
        - { id: no,  label: "❌ No, still facing an issue" }
    on_reply:
      yes: satisfied
      no:  ask_course_name

  # ===========================================================================
  # STEP 10 — Multiple results: access check on top result
  # ===========================================================================
  - id: fetch_access_settings_multi
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/accessSettings/read/{{ ctx.collected.course_id }}"
      headers:
        wid: "{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.accessControl.userGroups",
          to: collected.access_control_eligible,
          transform: check_user_eligibility,
          transform_ctx_key: collected.user_eligibility_ctx }
    on_success: branch_on_access_multi
    on_error:
      not_found: show_multiple_courses_public
      any:       show_multiple_courses_public
    timeout_ms: 5000

  - id: branch_on_access_multi
    type: branch
    rules:
      - { if: "ctx.collected.access_control_eligible == False", then: lookup_mdo_admin }
    default: show_multiple_courses_public

  # STEP 10.3 — Show top eligible course from multiple results
  # [GAP-2] Full per-course eligibility loop not possible in YAML; top result shown.
  - id: show_multiple_courses_public
    type: resolution
    prompt:
      text: |
        We found multiple courses matching your search on the platform.

        Here's the eligible course we'd recommend — please proceed with enrollment:

        📘 **Course Name:** {{ ctx.collected.course_name_found }}

        If this isn't the course you were looking for, please search again using a more specific name.
    steps: []
    action_button:
      label: "🔗 Open Course"
      url: "{{ env.KARMAYOGI_PORTAL_BASE_URL }}/app/toc/{{ ctx.collected.course_id }}/overview"
    follow_up:
      text: "Did you find the course you were looking for?"
      quick_replies:
        - { id: yes,   label: "✅ Yes, found it" }
        - { id: retry, label: "🔍 Search with a different name" }
    on_reply:
      yes:   satisfied
      retry: ask_course_name

  # ===========================================================================
  # STEP 8 — Course is RETIRED
  # ===========================================================================
  - id: show_course_retired
    type: resolution
    prompt:
      text: |
        We checked, and the course **{{ ctx.collected.course_name_found }}** has been retired and is no longer available for enrollment on the platform.
    steps: []
    next: satisfied

  # ===========================================================================
  # STEP 9 — Course is DRAFT / UNDER REVIEW / other non-Live status
  # ===========================================================================
  - id: show_course_unavailable
    type: resolution
    prompt:
      text: |
        We checked, and the course **{{ ctx.collected.course_name_found }}** is currently under review.

        As a result, it's temporarily unavailable for enrollment.
    steps: []
    next: satisfied

  # ===========================================================================
  # STEP 5 — Course not found → retry loop (no ticket)
  # ===========================================================================
  - id: course_not_found
    type: resolution
    prompt:
      text: |
        We couldn't find a course matching **"{{ ctx.collected.search_term }}"** in our records.

        Could you share the exact course name so we can look into this further and assist you?
    steps: []
    follow_up:
      text: "Please share the exact course name so we can search again."
      quick_replies:
        - { id: retry, label: "🔍 Try a different name" }
        - { id: done,  label: "✅ Exit" }
    on_reply:
      retry: ask_course_name
      done:  satisfied

  # ===========================================================================
  # MDO Admin lookup — provided by _mdo_admin_lookup fragment
  # on_success → mdo_found_result (defined below)
  # on_error   → mdo_api_error (defined below)
  # ===========================================================================

  # STEP 7.1.2 / STEP 13.1 — Branch on MDO admin count
  - id: mdo_found_result
    type: branch
    rules:
      - { if: "ctx.collected.mdo_admin_count == 0 or ctx.collected.mdo_admin_count == None",
          then: lookup_yp_contact }
    default: show_mdo_contact

  # MDO found — show contact details
  - id: show_mdo_contact
    type: resolution
    prompt:
      text: |
        We checked, and it looks like the course access criteria don't match your current profile.

        Please reach out to your MDO/YP for further assistance with course eligibility and access.

        Here are their contact details:

        👤 **Name:** {{ ctx.collected.mdo_admin_name }}
        📧 **Email ID:** {{ ctx.collected.mdo_admin_email }}
    steps: []
    next: satisfied

  - id: mdo_api_error
    type: branch
    rules: []
    default: lookup_yp_contact

  # ===========================================================================
  # YP/AM lookup — provided by _yp_lookup fragment
  # on_success → yp_found_result (defined below)
  # on_error   → yp_not_found (defined below)
  # ===========================================================================

  # YP found — show contact details
  - id: yp_found_result
    type: resolution
    prompt:
      text: |
        We checked, and it looks like the course access criteria don't match your current profile.

        Please reach out to your YP/AM for further assistance with course eligibility and access.

        Here are their contact details:

        👤 **Name:** {{ ctx.collected.yp_name }}
        📧 **Email ID:** {{ ctx.collected.yp_email }}
        📞 **Mobile:** {{ ctx.collected.yp_mobile }}
    steps: []
    next: satisfied

  # MDO not found AND YP not found
  - id: yp_not_found
    type: ticket_confirm
    prompt:
      text: |
        We checked, and it looks like the course access criteria don't match your current profile, but we couldn't retrieve an MDO or YP contact for your organization at this time.

        This needs further investigation from our support team. Would you like us to create a support ticket for this issue?
    on_confirm: yp_not_found_ticket_summary
    on_cancel: satisfied

  - id: yp_not_found_ticket_summary
    type: ticket_confirm
    prompt:
      text: |
        **Issue Identified:** Course Access — No MDO or YP Contact Found

        **Summary of Request:**
        The course access criteria don't match your current profile, and we could not locate an MDO or YP contact for your organization to help resolve this. You would like us to investigate this further.

        • **Organization:** {{ ctx.collected.org_channel | default('Not identified') }}

        Please review the details above and confirm whether they are correct.
    on_confirm: yp_not_found_raise_ticket
    on_cancel: satisfied

  - id: yp_not_found_raise_ticket
    type: transfer_llm
    auto_raise: silent
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user's course access criteria don't match their current profile, and no MDO or
        YP contact could be located for their organization either — so the user has no
        self-service path to resolve this.
        Generate a Zoho support ticket so the support team can manually identify the
        correct contact and resolve the eligibility/access issue.
        Subject: "Course Access — No MDO or YP Contact Found"
        Description: include the organization/channel and note that neither an MDO nor a
        YP contact could be found.
      priority_override: P3
    on_complete: confirm_ticket

  # Search API error
  - id: search_api_error
    type: message
    prompt:
      text: |
        **Search Unavailable**

        Search isn't available right now. Please try again in a moment.
    quick_replies:
      - { id: retry, label: "🔄 Try again" }
      - { id: done,  label: "✅ Exit" }
    on_reply:
      retry: ask_course_name
      done:  satisfied

  # ===========================================================================
  # PATH C — EVENT FLOW
  # ===========================================================================

  # STEP 15.1 — Ask for event name
  - id: ask_event_name
    type: collect
    prompt:
      text: |
        Could you share the exact name of the event you're looking for?
    field:
      name:        collected.event_name
      type:        text
      placeholder: "e.g. Digital Leadership Summit 2026"
    next: composite_event_search

  # STEP 15.2 — Composite Event Search
  # POST /api/composite/v4/search  (no primaryCategory filter so events are included)
  - id: composite_event_search
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/composite/v4/search"
      body:
        request:
          query: "{{ ctx.collected.event_name }}"
          filters:
            contentType: ["Event"]
            status: ["Live", "Review", "Draft", "Retired"]
          sort_by:
            createdOn: "desc"
          limit: 50
    response_mapping:
      - { from: "$.count",                 to: collected.event_search_count }
      - { from: "$.Event[0].name",       to: collected.event_name_found }
      - { from: "$.Event[0].status",     to: collected.event_status }
      - { from: "$.Event[0].identifier", to: collected.event_id }
    on_success: branch_event_results
    on_error:
      any: event_search_error
    timeout_ms: 8000

  # STEP 17.1 — Branch on event status
  - id: branch_event_results
    type: branch
    rules:
      # STEP 16 — No event found → retry loop (no ticket)
      - { if: "ctx.collected.event_name_found == None or ctx.collected.event_search_count == 0",
          then: event_not_found }
      # STEP 18 — Event is LIVE → check access eligibility
      - { if: "ctx.collected.event_status == 'Live'",
          then: fetch_event_access_settings }
      # Retired event
      - { if: "ctx.collected.event_status == 'Retired'",
          then: show_event_retired }
    default: show_event_unavailable

  # STEP 17.2 / STEP 19 — Access Settings check for event
  # GET /api/accessSettings/read/{event_id}  (karmayogi — same portal base URL)
  - id: fetch_event_access_settings
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/accessSettings/read/{{ ctx.collected.event_id }}"
      headers:
        wid: "{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.accessControl.userGroups",
          to: collected.event_access_control_eligible,
          transform: check_user_eligibility,
          transform_ctx_key: collected.user_eligibility_ctx }
    on_success: branch_event_access
    on_error:
      # No access config → treat as publicly accessible
      not_found: show_event_public
      any:       show_event_public
    timeout_ms: 5000

  # STEP 18.1 — Branch on event access eligibility
  - id: branch_event_access
    type: branch
    rules:
      # User does NOT meet access criteria → MDO/YP escalation
      - { if: "ctx.collected.event_access_control_eligible == False", then: lookup_mdo_admin }
    default: show_event_public

  # STEP 18.1 — Event is LIVE and user is eligible
  # [GAP-3] URL pattern not confirmed — using portal path as placeholder
  - id: show_event_public
    type: resolution
    prompt:
      text: |
        We found the event you were looking for on the platform.

        📅 **Event Name:** {{ ctx.collected.event_name_found }}

        Please use the link below to access the event and proceed accordingly.
    steps: []
    action_button:
      label: "🔗 Open Event"
      url: "{{ env.KARMAYOGI_PORTAL_BASE_URL }}/app/event-hub/home/{{ ctx.collected.event_id }}"
    follow_up:
      text: "Were you able to find and join the event?"
      quick_replies:
        - { id: yes, label: "✅ Yes, found it" }
        - { id: no,  label: "❌ No, still can't find it" }
    on_reply:
      yes: satisfied
      no:  ask_event_name

  # Event retired
  - id: show_event_retired
    type: resolution
    prompt:
      text: |
        The event **{{ ctx.collected.event_name_found }}** has been retired and is no longer available on the platform.
    steps: []
    next: satisfied

  # Event not Live (DRAFT / REVIEW / other)
  - id: show_event_unavailable
    type: resolution
    prompt:
      text: |
        We found the event **{{ ctx.collected.event_name_found }}**, but it's currently not available (Status: {{ ctx.collected.event_status or "Under Review" }}).

        It may be upcoming or being updated — please check back later.
    steps: []
    next: satisfied

  # STEP 16.1 — Event not found → retry loop (no ticket)
  - id: event_not_found
    type: resolution
    prompt:
      text: |
        We couldn't find an event matching **"{{ ctx.collected.event_name }}"** in our records.

        Could you share the exact event name so we can look into this further and assist you?
    steps: []
    follow_up:
      text: "Please share the exact event name so we can search again."
      quick_replies:
        - { id: retry, label: "🔍 Try a different name" }
        - { id: done,  label: "✅ Exit" }
    on_reply:
      retry: ask_event_name
      done:  satisfied

  - id: event_search_error
    type: message
    prompt:
      text: |
        **Search Unavailable**

        We're having trouble searching for events right now. Please try again in a moment.
    quick_replies:
      - { id: retry, label: "🔄 Try again" }
      - { id: done,  label: "✅ Exit" }
    on_reply:
      retry: ask_event_name
      done:  satisfied
