# =============================================================================
# MODE B — DETERMINISTIC
# =============================================================================
# Flow: Profile Verification — Designation / Group Not Verified (UC-05-v2)
#
# SOP:  Profile Verification Flow – Designation or Group Not Verified
# APIs: UC-05 Profile Verification — Designation / Group Transfer Request — API Integration Guide
#
# Execution order (per API doc):
#   STEP 1  POST /private/user/v1/search
#             → reads wfTransferRequest; determines has_pending_request
#             → if pending   → STEP 2
#             → if not found → guide submission steps (no further API call)
#             → API error    → error message
#
#   STEP 2  POST /private/user/v1/search   (pending request path only)
#             filters: channel = departmentName, role = MDO_ADMIN
#             → MDO_ADMIN found  → show admin contact
#             → MDO_ADMIN absent → YP lookup (in-memory Excel)
#             → API 401/403/404   → YP lookup (in-memory Excel)
#
#   YP FALLBACK (Global Rule — no admin available)
#             → data_lookup via yp_lookup service (Excel)
#             → YP found    → show yp contact
#             → YP not found → generic message
#
# SOP sub-scenarios §1.1–§1.4 are handled by asking the user after submission
# steps and re-reading the private profile to recheck wfTransferRequest.
#
# In-memory service:
#   yp_lookup  (_yp_lookup — Excel-backed YP/SPOC contact by org_channel)
# =============================================================================

flow_id: KARMAYOGI_BADGE_CHECK
flow_type: deterministic_with_llm_fallback
version: 2

metadata:
  category:         profile
  menu_label:       "🎖️ The Verified Karmayogi Badge is not visible."
  menu_group:       "Profile & User Management"
  menu_group_order: 1
  menu_order:       6
  classification:   Service Request
  default_portal:   Learner Portal
  default_priority: P3
  default_severity: Sev 3

enabled_channels: [web]

classification:
  triggers:
    - "designation not verified"
    - "group not verified"
    - "profile not verified"
    - "verification pending"
    - "designation verification"
    - "group verification"
    - "designation not showing"
    - "designation pending"
    - "group pending"

entry_node: fetch_private_profile

imports:
  - _yp_lookup
  - _terminal
  - fragment: _zoho_ticket
    with:
      cf_category:     profile
      cf_sub_category: karmayogi_badge_check
      cf_flow_id:      KARMAYOGI_BADGE_CHECK

nodes:

  # ===========================================================================
  # STEP 1 — POST /private/user/v1/search
  #           Fetch private profile to read wfTransferRequest
  # ===========================================================================

  - id: fetch_private_profile
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/private/user/v1/search"
      body:
        request:
          filters:
            userId: "{{ ctx.user_id_hash }}"
          limit: 1
    response_mapping:
      - { from: "$.response.content[0].wfTransferRequest.wfId",                                    to: collected.wf_id }
      - { from: "$.response.content[0].wfTransferRequest.departmentName",                          to: collected.transfer_dept_name }
      - { from: "$.response.content[0].channel",                                                   to: collected.org_channel }
      - { from: "$.response.content[0].rootOrgId",                                                 to: collected.root_org_id }
      - { from: "$.response.content[0].profileDetails.profileDesignationStatus",                   to: collected.designation_status }
      - { from: "$.response.content[0].profileDetails.profileGroupStatus",                         to: collected.group_status }
      - { from: "$.response.content[0].profileDetails.profileStatus",                              to: collected.profile_status }
      - { from: "$.response.content[0].profileDetails.professionalDetails[0].designation",         to: collected.current_designation }
      - { from: "$.response.content[0].profileDetails.professionalDetails[0].group",               to: collected.current_group }
      - { from: "$.response.content[0].profileDetails.professionalDetails[0].name",                to: collected.current_dept_name }
    on_success: branch_on_verified_status
    on_error:
      any: profile_api_error
    timeout_ms: 5000

  - id: profile_api_error
    type: message
    prompt:
      text: |
        I couldn't retrieve your profile details at this time.

        Please try again in a few minutes.
    next: satisfied

  # ===========================================================================
  # SOP §1.1 / §1.2 — Gate: is the profile already verified?
  #   Checks (per SOP §1.1):
  #     - overall profileStatus == VERIFIED, OR both profileDesignationStatus
  #       and profileGroupStatus == VERIFIED individually
  #     - Group / Designation / Department details are present
  #       (current_dept_name falls back to channel per API doc note, since
  #       professionalDetails[0].name is not always present)
  #     - no pending verification/transfer request (wf_id absent)
  # ===========================================================================

  - id: branch_on_verified_status
    type: branch
    rules:
      - if: >
          (
          (ctx.collected.profile_status != None and ctx.collected.profile_status.lower() == 'verified') or
          (ctx.collected.designation_status != None and ctx.collected.designation_status.lower() == 'verified' and
          ctx.collected.group_status != None and ctx.collected.group_status.lower() == 'verified')
          ) and
          ctx.collected.current_group != None and ctx.collected.current_group != '' and
          ctx.collected.current_designation != None and ctx.collected.current_designation != '' and
          (
          (ctx.collected.current_dept_name != None and ctx.collected.current_dept_name != '') or
          (ctx.collected.org_channel != None and ctx.collected.org_channel != '')
          ) and
          (ctx.collected.wf_id == None or ctx.collected.wf_id == '')
        then: show_already_verified
    default: branch_on_pending_request

  - id: show_already_verified
    type: message
    prompt:
      text: |
        We checked, and found that your profile has already been verified and there are no pending verification requests.

        To verify the Verified Karmayogi Badge:
        Go to your profile.
        Check the area next to your name.
        A green tick mark should be visible next to your name.

        The green tick indicates that the Verified Karmayogi Badge has been successfully assigned to your profile.
    next: satisfied

  # ===========================================================================
  # Branch — does a pending transfer/designation request exist?
  # Decision: wfId present OR departmentName present → has_pending_request = true
  # ===========================================================================

  - id: branch_on_pending_request
    type: branch
    rules:
      - if: "(ctx.collected.wf_id != None and ctx.collected.wf_id != '') or (ctx.collected.transfer_dept_name != None and ctx.collected.transfer_dept_name != '')"
        then: lookup_mdo_leader
    default: show_submission_steps
    # No wfTransferRequest → guide user to submit; no further API call

  # ===========================================================================
  # STEP 2 — POST /private/user/v1/search
  #           MDO_ADMIN lookup for transfer target department
  #           Runs ONLY on pending request path
  # ===========================================================================

  - id: lookup_mdo_leader
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/private/user/v1/search"
      body:
        request:
          query: ""
          filters:
            channel: "{{ ctx.collected.transfer_dept_name }}"
            organisations.roles: ["MDO_ADMIN"]
            status: 1
          limit: 1
    response_mapping:
      - { from: "$.response.count",                                                          to: collected.mdo_leader_count }
      - { from: "$.response.content[0].profileDetails.personalDetails.firstname",            to: collected.mdo_leader_name }
      - { from: "$.response.content[0].profileDetails.personalDetails.surname",              to: collected.mdo_leader_surname }
      - { from: "$.response.content[0].profileDetails.personalDetails.primaryEmail",         to: collected.mdo_leader_email }
      - { from: "$.response.content[0].firstName",                                           to: collected.mdo_leader_name_fallback }
      - { from: "$.response.content[0].email",                                               to: collected.mdo_leader_email_fallback }
    on_success: branch_mdo_leader_found
    on_error:
      # 401 / 403 / 404 / any → treat as not found per API doc
      any: lookup_yp_contact
    timeout_ms: 5000

  - id: branch_mdo_leader_found
    type: branch
    rules:
      - if: "ctx.collected.mdo_leader_count != None and ctx.collected.mdo_leader_count > 0"
        then: show_admin_contact
    default: lookup_yp_contact
    # count = 0 or empty content → Global Rule: look up YP

  # ---------------------------------------------------------------------------
  # §1.1.1 — MDO Leader / Org Admin present
  # ---------------------------------------------------------------------------

  - id: show_admin_contact
    type: message
    prompt:
      text: |
        Your designation request has already been submitted and is awaiting approval from the Organization Admin. 
        
        Please contact the below admin for further assistance: 
        Admin Name: {{ ctx.collected.mdo_leader_name or ctx.collected.mdo_leader_name_fallback }}
        Admin Email ID: {{ ctx.collected.mdo_leader_email or ctx.collected.mdo_leader_email_fallback }}
    next: satisfied

  # ---------------------------------------------------------------------------
  # §1.1.2 — No Org Admin → Global Rule: YP lookup from Excel
  #           _yp_lookup fragment provides lookup_yp_contact
  #           key: collected.org_channel (channel from Step 1 profile)
  #           on_success → yp_found_result
  #           on_error   → yp_not_found
  # ---------------------------------------------------------------------------

  - id: yp_found_result
    type: message
    prompt:
      text: |
        Your designation request has already been submitted. However, there is currently no Organization Admin available to approve the request. 
        
        Please connect with the concerned YP for further assistance.
        YP Name: {{ ctx.collected.yp_name }}
        YP Email ID: {{ ctx.collected.yp_email }}
    next: satisfied

  - id: yp_not_found
    type: ticket_confirm
    prompt:
      text: |
        We checked, and found that your designation request has already been submitted, but there is currently no Organization Admin or YP contact available for your organization to assist with approval.

        This needs further investigation from our support team. Would you like us to create a support ticket for this issue?
    on_confirm: yp_not_found_ticket_summary
    on_cancel: satisfied

  - id: yp_not_found_ticket_summary
    type: ticket_confirm
    prompt:
      text: |
        **Issue Identified:** Designation / Group Verification — No Admin or YP Contact Found

        **Summary of Request:**
        Your designation request has already been submitted, but there is currently no Organization Admin available to approve it, and we could not locate a YP contact for your organization either. You would like us to investigate this further.

        • **Organization:** {{ ctx.collected.org_channel | default('Not identified') }}

        Please review the details above and confirm whether they are correct.
    on_confirm: yp_not_found_raise_ticket
    on_cancel: satisfied

  - id: yp_not_found_raise_ticket
    type: transfer_llm
    auto_raise: silent
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user's designation/group verification request is pending, but no Organization
        Admin could be found to approve it, and no YP/SPOC contact could be located for
        their organization either — so the user has no self-service path to get it approved.
        Generate a Zoho support ticket so the support team can manually identify the
        correct approver and resolve the pending request.
        Subject: "Designation/Group Verification — No Admin or YP Contact Found"
        Description: include the organization/channel and note that the request is pending
        with no available approver or YP contact.
      priority_override: P3
    on_complete: confirm_ticket

  # ===========================================================================
  # §1.2 — No pending request — guide user through submission steps
  # ===========================================================================

  - id: show_submission_steps
    type: resolution
    prompt:
      text: |
        Please follow the steps below to update and submit your designation or group for approval:
    steps:
      - "Click on View Profile."
      - "Navigate to Primary Details and click the Edit icon."
      - "Update the correct Group and Designation."
      - "Click Send for Approval."
      - "Once the request is submitted, it will be sent to the Organization Admin for approval. The designation or group will reflect in your profile after approval."
    next: satisfied
