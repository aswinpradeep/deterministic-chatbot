# =============================================================================
# MODE B — DETERMINISTIC + LLM TICKET TAIL
# =============================================================================
# Flow: Course / Program / Event Progress Issue (UC-01)
# SOP Version: Latest (Certificate + Technical Issue + Assessment Limit + Engineering Excel Remarks)
#
# Mode B pattern:
#   1. User picks affected course/program/event from their enrollment list
#   2. Call Enrollment API → validate certificateIssued field
#   3. Identify content type (Course / Program / Event)
#      - If Program: call Hierarchy Read API to fetch child Course DO_IDs
#   4. Call Admin Content State API → compare status per leaf resource
#      - Enrollment API status=1 AND Admin Content State status=2 → Technical Issue
#   5. If technical issue → confirm with user → raise ticket + update Engineering Excel
#   6. If no technical issue → identify pending resources → route by resource type
#      - SCORM / Non-SCORM / Assessment flows
#   7. If all resources complete but no certificate → revalidate from Step 2
#   8. Engineering Excel remarks handling (Success / Sync Completed / Failed)
#
# APIs used:
#   POST /api/course/private/v4/user/enrollment/list/{user_id}
#   GET  /api/content/v1/hierarchy/{program_id}
#   GET  /api/content/v1/read/{course_id}
#   POST /api/content/v1/search
#   POST /api/admin/content/v1/state          (Admin Content State API)
#   GET  /api/assessment/v1/attempts/{user_id}/{content_id}  (Assessment Limit API)
# =============================================================================

flow_id: COURSE_PROGRESS_ISSUE
flow_type: deterministic_with_llm_fallback
version: 3

metadata:
  category:         course
  menu_label:       "📊 Course progress issue"
  menu_group:       "Content Related Issue"
  menu_group_order: 2
  menu_order:       3
  classification:   Incident
  default_portal:   Learner Portal
  default_priority: P3
  default_severity: Sev 3

enabled_channels: [web]

classification:
  triggers:
    - "course progress not updating"
    - "progress stuck"
    - "module not marked complete"
    - "course not completing"
    - "progress issue"
    - "course progress problem"
    - "program progress not updating"
    - "event progress stuck"
    - "certificate not generated"
    - "certificate not issued"
    - "progress not updating"
    - "resource not completing"

entry_node: pick_content_type

imports:
  - _terminal
  - fragment: _zoho_ticket
    with:
      cf_category:     course
      cf_sub_category: course_progress
      cf_flow_id:      COURSE_PROGRESS_ISSUE

nodes:

  # ===========================================================================
  # STEP 1 — Ask user: Course / Program, or Event?
  # ===========================================================================
  - id: pick_content_type
    type: message
    prompt:
      text: "Are you facing the issue with a **Course / Program**, or an **Event**?"
    quick_replies:
      - { id: COURSE_PROGRAM, label: "📚 Course / Program" }
      - { id: EVENT,          label: "📅 Event" }
    disable_input: true
    on_reply:
      COURSE_PROGRAM: pick_course_from_list
      EVENT:          pick_event_from_list

  # ---------------------------------------------------------------------------
  # Picker A — Courses & Programs (same enrollment list API, no filter needed)
  # Both Course and Program appear in $.courses with different primaryCategory.
  # primaryCategory is captured via extra_fields → used downstream in
  # branch_on_content_type to decide whether to call the hierarchy API.
  # ---------------------------------------------------------------------------
  - id: pick_course_from_list
    type: collect
    prompt:
      text: "Kindly search and select the relevant **Course / Program** for which you are facing the progress update or certificate generation issue:"
    field:
      name: collected.course_id
      type: select
    dynamic_options:
      source: api
      integration: karmayogi
      request:
        method: POST
        url: "/api/course/private/v4/user/enrollment/list/{{ ctx.user_id_hash }}"
        body:
          request:
            retiredCoursesEnabled: true
            status: ["In-Progress", "Completed"]
      response_mapping:
        list_path:       "$.courses"
        id_field:        courseId
        label_field:     courseName
        sub_label_field: completionPercentage
        extra_fields:
          - { from: courseName,           to: collected.course_name }
          - { from: completionPercentage, to: collected.completion_pct }
          - { from: langContentStatus,    to: collected.completed_ids,        transform: extract_completed_ids }
          - { from: langContentStatus,    to: collected.incomplete_ids,       transform: extract_incomplete_ids }
          - { from: status,               to: collected.enrollment_status,    transform: enrollment_status_to_int }
          - { from: completedOn,          to: collected.completed_on_iso,     transform: unix_ms_to_iso }
          - { from: issuedCertificates,   to: collected.issued_certificates }
          - { from: batchId,              to: collected.batch_id }
          - { from: primaryCategory,      to: collected.primary_category }
      search:     { enabled: true, placeholder: "Search your enrolled courses and programs..." }
      pagination: { enabled: true, page_size: 10 }
      cache_ttl:  300
    next: api_enrollment_check


  # ---------------------------------------------------------------------------
  # Picker B — Events (from /api/user/private/v1/events/list/{user_id})
  # Same API pattern as karma_points_issue.yaml → ev_fetch_events_list
  # ---------------------------------------------------------------------------
  - id: pick_event_from_list
    type: collect
    prompt:
      text: "Kindly search and select the relevant **Event** for which you are facing the progress issue:"
    field:
      name: collected.course_id
      type: select
    dynamic_options:
      source: api
      integration: karmayogi
      request:
        method: GET
        url: "/api/user/private/v1/events/list/{{ ctx.user_id_hash }}"
      response_mapping:
        list_path:   "$.events"
        id_field:    contentId
        label_field: event.name
        extra_fields:
          - { from: event.name,  to: collected.course_name }
          - { from: status,      to: collected.enrollment_status,  transform: enrollment_status_to_int }
          - { from: completedOn, to: collected.completed_on_iso,   transform: unix_ms_to_iso }
      search:     { enabled: true, placeholder: "Search your enrolled events..." }
      pagination: { enabled: true, page_size: 10 }
      cache_ttl:  300
    next: branch_event_progress


  # ---------------------------------------------------------------------------
  # Event progress guidance — shown after pick_event_from_list.
  # Events do not have a certificate flow; route directly to progress guidance.
  # The picker (pick_event_from_list) already captures event name + status via
  # extra_fields, so no additional API call is needed here.
  # ---------------------------------------------------------------------------
  - id: branch_event_progress
    type: resolution
    prompt:
      text: |
        We have retrieved the details for your selected event **{{ ctx.collected.course_name }}**.

        Please follow the steps below to ensure your event progress is recorded:
    steps:
      - "Ensure you attended the event session **live** (on-time participation is required for progress to be recorded)"
      - "Go to **Profile** → **My Learning** → **Events** tab"
      - "Locate the event and check whether it shows as **Completed**"
      - "If still showing In-Progress, please wait up to **24 hours** for the system to sync and update your progress"
    follow_up:
      text: "Has your event progress been updated?"
      quick_replies:
        - { id: YES,     label: "✅ Yes, progress updated" }
        - { id: NO,      label: "❌ No, still not updating" }
        - { id: PENDING, label: "🕐 I'll check and come back" }
    on_reply:
      YES:     progress_updated_end
      NO:      progress_collect_email
      PENDING: progress_pending_end



  # ===========================================================================
  # STEP 2 — Validate Certificate Generation Status
  # Call Enrollment API → validate certificateIssued field
  # ===========================================================================
  - id: api_enrollment_check
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/course/private/v4/user/enrollment/list/{{ ctx.user_id_hash }}"
      body:
        request:
          filters:
            courseId: "{{ ctx.collected.course_id }}"
          fields: ["id", "courseId", "contentId", "status", "completionPercentage",
                   "issuedCertificates", "contentType", "primaryCategory"]
    response_mapping:
      - { from: "$.result.enrollments[0].issuedCertificates", to: collected.certificate_issued,
          transform: has_issued_certificates }
      - { from: "$.result.enrollments[0].completionPercentage", to: collected.completion_pct }
      - { from: "$.result.enrollments[0].primaryCategory",   to: collected.primary_category }
      - { from: "$.result.enrollments[0].contentId",         to: collected.content_do_id }
      - { from: "$.result.enrollments[0].status",            to: collected.enrollment_status }
    on_success: branch_on_certificate_issued
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  # Branch: if certificate is already issued, inform the user and close
  - id: branch_on_certificate_issued
    type: branch
    rules:
      - { if: "ctx.collected.certificate_issued == True",
          then: resolution_certificate_already_issued }
    default: api_read_content_type

  # Resolution: certificate already generated
  - id: resolution_certificate_already_issued
    type: message
    prompt:
      text: |
        Your certificate for **{{ ctx.collected.course_name }}** has already been generated. 🎉

        Kindly check your profile under the **Certificates** section.
    next: satisfied

  # ===========================================================================
  # STEP 3 — Identify Content Type
  # certificateIssued == False → call Private Content Read API to get
  # primaryCategory authoritatively (Course / Program / Event).
  # DO_ID used: the course_id selected by the user from the enrollment list.
  # API: GET /api/content/v1/read/{do_id}
  # ===========================================================================
  - id: api_read_content_type
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/content/v1/read/{{ ctx.collected.course_id }}"
    response_mapping:
      - { from: "$.result.content.primaryCategory", to: collected.primary_category }
    on_success: branch_on_content_type
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  # Branch on the freshly fetched primaryCategory
  # Course / Event → proceed directly with the selected DO_ID
  # Program        → call Hierarchy Read API to fetch child Course DO_IDs first
  - id: branch_on_content_type
    type: branch
    rules:
      - { if: "ctx.collected.primary_category == 'Program'",
          then: api_fetch_program_hierarchy }
    default: api_admin_content_state

  # Fetch child Course DO_IDs for Programs via Hierarchy Read API
  - id: api_fetch_program_hierarchy
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/content/v1/hierarchy/{{ ctx.collected.course_id }}"
    response_mapping:
      - { from: "$.content.children[*].identifier",
          to:   collected.child_course_ids,
          transform: extract_all_identifiers }
    on_success: api_admin_content_state
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  # ===========================================================================
  # STEP 4 — Call Admin Content State API
  # Must always be called using Course DO_ID(s).
  # For Programs → use child_course_ids from hierarchy.
  # For Course / Event → use course_id directly.
  # ===========================================================================
  - id: api_admin_content_state
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/admin/content/v1/state"
      body:
        request:
          userId:    "{{ ctx.user_id_hash }}"
          courseIds: "{{ ctx.collected.child_course_ids | default([ctx.collected.course_id]) }}"
    response_mapping:
      - { from: "$.result.contentList[*]",
          to:   collected.admin_content_states,
          transform: extract_content_state_list }
    on_success: branch_on_technical_issue
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  # ===========================================================================
  # STEP 5 — Check for Technical Issues
  # Enrollment API status=1 AND Admin Content State API status=2
  # for the same resource → technical issue
  # ===========================================================================
  - id: branch_on_technical_issue
    type: branch
    rules:
      - { if: "has_technical_issue(ctx.collected.admin_content_states, ctx.collected.enrollment_status)",
          then: confirm_technical_issue }
      - { if: "ctx.collected.completion_pct == 100",
          then: branch_certificate_not_generated }
    default: api_read_course_content

  # ===========================================================================
  # STEP 6 — Technical Issue Found → Obtain User Confirmation
  # ===========================================================================
  - id: confirm_technical_issue
    type: message
    prompt:
      text: |
        Upon checking, we found some **technical issues** affecting one or more resources under the selected **{{ ctx.collected.course_name }}**.

        We can raise a support ticket for further investigation.

        Kindly confirm whether you would like us to proceed.
    quick_replies:
      - { id: yes, label: "✅ Yes, please raise a ticket" }
      - { id: no,  label: "❌ No, thank you" }
    disable_input: true
    on_reply:
      yes: technical_issue_collect_email
      no:  technical_issue_declined

  # User declined — close politely
  - id: technical_issue_declined
    type: message
    prompt:
      text: |
        Understood. Please feel free to reach out if you require any further assistance.
    next: satisfied

  # Collect email before raising ticket for technical issue
  - id: technical_issue_collect_email
    type: collect
    prompt:
      text: "Please enter your **registered email address** so we can raise the support ticket:"
    field:
      name: collected.user_email
      type: email
      validation:
        pattern:   "^[\\w.+-]+@[\\w-]+\\.[a-z]{2,}$"
        error_msg: "That doesn't look like a valid email. Please try again."
    next: technical_issue_auto_ticket

  # Raise ticket + update Engineering Excel for technical issue
  - id: technical_issue_auto_ticket
    type: transfer_llm
    auto_raise: true
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        A technical issue has been detected for this user's course/program/event progress.
        Enrollment API status = 1 and Admin Content State API status = 2 for one or more resources.
        Generate a Zoho support ticket AND update the Engineering Excel with:
          - User ID: {{ ctx.user_id_hash }}
          - Program / Course / Event DO_ID: {{ ctx.collected.course_id }}
          - Content DO_ID: {{ ctx.collected.content_do_id }}
        Subject: "Technical Issue – Progress Not Updating — <course_name>"
        Description: include user_id, course_name, course_id, content_do_id,
          admin_content_states mismatch details, and user_email.
      engineering_excel_update:
        user_id:        "{{ ctx.user_id_hash }}"
        do_id:          "{{ ctx.collected.course_id }}"
        content_do_id:  "{{ ctx.collected.content_do_id }}"
      priority_override: P3
    on_complete: confirm_ticket

  # ===========================================================================
  # STEP 7 — No Technical Issue: Identify Pending Resources
  # Cross-check leaf nodes from content/read API
  # ===========================================================================
  - id: api_read_course_content
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/content/v1/read/{{ ctx.collected.course_id }}"
    response_mapping:
      - { from: "$.content.leafNodes",
          to:   collected.incomplete_ids,
          transform: diff_leaf_nodes,
          transform_ctx_key: collected.completed_ids }
    on_success: branch_on_leaf_ids_available
    on_error:
      any: api_fetch_resource_metadata
    timeout_ms: 8000

  - id: branch_on_leaf_ids_available
    type: branch
    rules:
      - { if: "len(ctx.collected.incomplete_ids) == 0",
          then: branch_certificate_not_generated }
    default: api_fetch_resource_metadata

  # ===========================================================================
  # STEP 12 — All resources complete but certificate not generated → Revalidate
  # ===========================================================================
  - id: branch_certificate_not_generated
    type: message
    prompt:
      text: |
        It appears all resources under **{{ ctx.collected.course_name }}** have been completed. However, the certificate has not yet been generated.

        We will now re-validate your completion status. Please wait a moment…
    next: api_enrollment_revalidate

  # Revalidate: re-call Enrollment API (Step 2 repeated)
  - id: api_enrollment_revalidate
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/course/private/v4/user/enrollment/list/{{ ctx.user_id_hash }}"
      body:
        request:
          filters:
            courseId: "{{ ctx.collected.course_id }}"
          fields: ["id", "courseId", "contentId", "status", "completionPercentage",
                   "issuedCertificates", "contentType", "primaryCategory"]
    response_mapping:
      - { from: "$.result.enrollments[0].issuedCertificates", to: collected.certificate_issued,
          transform: has_issued_certificates }
      - { from: "$.result.enrollments[0].completionPercentage", to: collected.completion_pct }
      - { from: "$.result.enrollments[0].status",            to: collected.enrollment_status }
    on_success: branch_revalidate_certificate
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  - id: branch_revalidate_certificate
    type: branch
    rules:
      - { if: "ctx.collected.certificate_issued == True",
          then: resolution_certificate_already_issued }
    default: api_admin_content_state_revalidate

  # Re-call Admin Content State API for revalidation
  - id: api_admin_content_state_revalidate
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/admin/content/v1/state"
      body:
        request:
          userId:    "{{ ctx.user_id_hash }}"
          courseIds: "{{ ctx.collected.child_course_ids | default([ctx.collected.course_id]) }}"
    response_mapping:
      - { from: "$.result.contentList[*]",
          to:   collected.admin_content_states,
          transform: extract_content_state_list }
    on_success: branch_revalidate_technical_issue
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  - id: branch_revalidate_technical_issue
    type: branch
    rules:
      - { if: "has_technical_issue(ctx.collected.admin_content_states, ctx.collected.enrollment_status)",
          then: confirm_technical_issue }
    default: resolution_escalate_internally

  # No technical issue on revalidation → escalate internally
  - id: resolution_escalate_internally
    type: message
    prompt:
      text: |
        We have completed re-validation of your progress for **{{ ctx.collected.course_name }}**.

        No technical issue was identified, but the certificate has still not been generated.

        We are escalating this issue internally to the concerned team for further investigation.

        Please feel free to reach out if you require any further assistance.
    next: satisfied

  # ===========================================================================
  # STEP 8 — Identify Resource Type: SCORM / Non-SCORM / Assessment
  # ===========================================================================
  - id: api_fetch_resource_metadata
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/content/v1/search"
      body:
        request:
          filters:
            identifier: "{{ ctx.collected.incomplete_ids }}"
          isSecureSettingsDisabled: true
          sort_by:
            createdOn: "desc"
          fields: ["identifier", "name", "mimeType", "status", "duration",
                   "primaryCategory"]
          facets: ["status"]
          limit: 1000
    response_mapping:
      - { from: "$.content[*].name",    to: collected.incomplete_resource_names,   transform: extract_all_names }
      - { from: "$.content[*].mimeType", to: collected.has_scorm_resources,         transform: detect_scorm }
      - { from: "$.content[*]",          to: collected.scorm_resource_name,         transform: extract_scorm_resource_name }
      - { from: "$.content[*]",          to: collected.scorm_resource_duration_min, transform: extract_scorm_duration_minutes }
      - { from: "$.content[*]",          to: collected.all_resources_assessment,    transform: detect_assessment_only }
    on_success: branch_on_resource_type
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  - id: branch_on_resource_type
    type: branch
    rules:
      - { if: "ctx.collected.all_resources_assessment == true", then: resolution_assessment_guidance }
      - { if: "ctx.collected.has_scorm_resources == true",      then: resolution_scorm_guidance }
    default: resolution_non_scorm_guidance

  # ===========================================================================
  # STEP 9 — SCORM Resource Flow
  # ===========================================================================
  - id: resolution_scorm_guidance
    type: resolution
    prompt:
      text: |
        We found that the resource **"{{ ctx.collected.scorm_resource_name }}"** is still **In Progress** or **Not Started**.

        This resource is in **SCORM format**. Please follow the instructions below carefully:

        - Complete the resource in **one continuous session**.
        - **Do not increase the playback speed** while viewing the content.
        - Complete **at least 60% of the total duration** of the resource.
        - **Do not switch browser tabs or move to another application** while the SCORM resource is playing, as this may interrupt progress tracking and prevent completion from being recorded.
        - After completing the resource, click the **Next** button.

        Progress will be updated only after the above steps are completed successfully.
    steps:
      - "Go to **Profile**"
      - "Click on **My Learning**"
      - "Open the **In Progress** section"
      - "Locate and select **{{ ctx.collected.course_name }}**"
      - "Click **Resume**"
      - "Expand each module using the **+ icon**"
      - "Check for content items **without a blue tick mark**"
      - "Complete all pending resources until every item displays a **blue tick**"
    follow_up:
      text: "Has your issue been resolved? Please let us know if you need any further assistance."
      quick_replies:
        - { id: YES,     label: "✅ Yes, progress updated" }
        - { id: NO,      label: "❌ No, still not updating" }
        - { id: PENDING, label: "🕐 I'll try and come back" }
    on_reply:
      YES:     progress_updated_end
      NO:      progress_collect_email
      PENDING: progress_pending_end

  # ===========================================================================
  # STEP 10 — Non-SCORM Resource Flow
  # ===========================================================================
  - id: resolution_non_scorm_guidance
    type: resolution
    prompt:
      text: |
        We found that the following resource(s) under **{{ ctx.collected.course_name }}** are still **incomplete**:

        {{ ctx.collected.incomplete_resource_names }}

        Kindly revisit and complete the above resource(s).
    steps:
      - "Go to **Profile** → **My Learning** → **In Progress**"
      - "Locate **{{ ctx.collected.course_name }}** and click **Resume**"
      - "Expand each module using the **+ icon**"
      - "Check for content items **without a blue tick mark**"
      - "Complete all pending resources until every item displays a **blue tick**"
    follow_up:
      text: "Has your issue been resolved? Please let us know if you need any further assistance."
      quick_replies:
        - { id: YES,     label: "✅ Yes, progress updated" }
        - { id: NO,      label: "❌ No, still not updating" }
        - { id: PENDING, label: "🕐 I'll try and come back" }
    on_reply:
      YES:     progress_updated_end
      NO:      progress_collect_email
      PENDING: progress_pending_end

  # ===========================================================================
  # STEP 11 — Assessment Flow
  # ===========================================================================
  - id: resolution_assessment_guidance
    type: resolution
    prompt:
      text: |
        We found that all learning resources under **{{ ctx.collected.course_name }}** have been completed successfully.

        However, the **assessment** is still pending.

        Kindly complete the assessment to achieve **100% completion**.
    steps:
      - "Go to **Profile** → **My Learning** → **In Progress**"
      - "Open **{{ ctx.collected.course_name }}** → click **Resume**"
      - "Expand each module using the **+ icon** and locate the pending assessment"
      - "Complete the assessment — all modules must show a **blue tick** for 100% completion"
    follow_up:
      text: "Were you able to complete the assessment?"
      quick_replies:
        - { id: YES,     label: "✅ Yes, completed successfully" }
        - { id: NO,      label: "❌ No, facing an issue" }
        - { id: PENDING, label: "🕐 I'll try and come back" }
    on_reply:
      YES:     progress_updated_end
      NO:      assessment_issue_check
      PENDING: progress_pending_end

  # Ask what kind of issue the user faces with the assessment (Section 11.3)
  - id: assessment_issue_check
    type: message
    prompt:
      text: "I'm sorry to hear that. Could you tell me more about the issue you're facing with the assessment?"
    quick_replies:
      - { id: mobile,         label: "📱 Unable to complete from Mobile" }
      - { id: limit_exceeded, label: "🚫 Assessment Limit Exceeded" }
      - { id: other_error,    label: "⚠️ Any Other Error" }
    disable_input: true
    on_reply:
      mobile:         assessment_mobile_guidance
      limit_exceeded: api_assessment_limit_check
      other_error:    assessment_other_error_collect

  # Section 11.4 — Mobile guidance
  - id: assessment_mobile_guidance
    type: message
    prompt:
      text: |
        Kindly try completing the assessment through the **web portal** by following the steps below:

        1. Open **Google Chrome** or any web browser.
        2. Search for **iGOT Karmayogi**.
        3. Open the **iGOT Karmayogi Portal**.
        4. From the browser menu, enable **Desktop Site**.
        5. Log in using your credentials.
        6. Navigate to **My Learning**.
        7. Open the relevant **Course / Program / Event**.
        8. Click **Resume**.
        9. Open the assessment and complete it.
    next: satisfied

  # Section 11.5 — Assessment Limit Exceeded: call Assessment Limit API
  - id: api_assessment_limit_check
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/assessment/v1/attempts/{{ ctx.user_id_hash }}/{{ ctx.collected.content_do_id }}"
    response_mapping:
      - { from: "$.result.remainingAttempts", to: collected.remaining_attempts }
      - { from: "$.result.maxAttempts",       to: collected.max_attempts }
      - { from: "$.result.usedAttempts",      to: collected.used_attempts }
    on_success: branch_on_assessment_attempts
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  - id: branch_on_assessment_attempts
    type: branch
    rules:
      - { if: "ctx.collected.remaining_attempts > 0",
          then: resolution_attempts_available }
    default: progress_collect_email   # Limit actually exceeded → raise ticket

  # Attempts still available → inform user
  - id: resolution_attempts_available
    type: message
    prompt:
      text: |
        Upon verification, you still have **{{ ctx.collected.remaining_attempts }} attempt(s)** remaining.

        Kindly retry the assessment.
    next: satisfied

  # Section 11.6 — Any Other Error: capture error, raise ticket
  - id: assessment_other_error_collect
    type: collect
    prompt:
      text: "Please describe the error you are seeing (and share a screenshot if available):"
    field:
      name: collected.error_description
      type: text
    next: assessment_other_error_email

  - id: assessment_other_error_email
    type: collect
    prompt:
      text: "Please enter your **registered email address** so we can raise the support ticket:"
    field:
      name: collected.user_email
      type: email
      validation:
        pattern:   "^[\\w.+-]+@[\\w-]+\\.[a-z]{2,}$"
        error_msg: "That doesn't look like a valid email. Please try again."
    next: assessment_other_error_ticket

  - id: assessment_other_error_ticket
    type: transfer_llm
    auto_raise: true
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user encountered an error while attempting an assessment.
        Generate a Zoho support ticket.
        Subject: "Assessment Error — <course_name>"
        Description: include user_id, course_name, course_id, content_do_id,
          error_description, and user_email.
      priority_override: P3
    on_complete: confirm_ticket

  # ===========================================================================
  # SECTION 13 — Engineering Excel Remarks Handling
  # Triggered after Engineering Team updates remarks in the backend.
  # Entry point: engineering_excel_remarks_check
  # ===========================================================================
  - id: engineering_excel_remarks_check
    type: branch
    rules:
      - { if: "ctx.collected.engineering_remark == 'Success, Certificate Issued'",
          then: remark_certificate_issued }
      - { if: "ctx.collected.engineering_remark == 'Sync Completed, Course is Incomplete'",
          then: remark_sync_completed_revalidate }
      - { if: "ctx.collected.engineering_remark == 'Failed'",
          then: remark_failed }
    default: remark_failed

  # Remark 1 — Success, Certificate Issued (Section 13.1)
  - id: remark_certificate_issued
    type: message
    prompt:
      text: |
        Your certificate has been generated successfully. 🎉

        Kindly check your profile under the **Certificates** section.
    next: satisfied

  # Remark 2 — Sync Completed, Course is Incomplete (Section 13.2)
  # Restart validation from Step 2
  - id: remark_sync_completed_revalidate
    type: message
    prompt:
      text: |
        The engineering team has completed the sync. We will now re-validate your progress. Please wait a moment…
    next: api_enrollment_revalidate_remark

  - id: api_enrollment_revalidate_remark
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/course/private/v4/user/enrollment/list/{{ ctx.user_id_hash }}"
      body:
        request:
          filters:
            courseId: "{{ ctx.collected.course_id }}"
          fields: ["id", "courseId", "contentId", "status", "completionPercentage",
                   "issuedCertificates", "contentType", "primaryCategory"]
    response_mapping:
      - { from: "$.result.enrollments[0].issuedCertificates", to: collected.certificate_issued,
          transform: has_issued_certificates }
      - { from: "$.result.enrollments[0].completionPercentage", to: collected.completion_pct }
      - { from: "$.result.enrollments[0].status",            to: collected.enrollment_status }
    on_success: branch_remark_revalidate_certificate
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  - id: branch_remark_revalidate_certificate
    type: branch
    rules:
      - { if: "ctx.collected.certificate_issued == True",
          then: remark_certificate_issued }
    default: api_admin_content_state_remark

  - id: api_admin_content_state_remark
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/admin/content/v1/state"
      body:
        request:
          userId:    "{{ ctx.user_id_hash }}"
          courseIds: "{{ ctx.collected.child_course_ids | default([ctx.collected.course_id]) }}"
    response_mapping:
      - { from: "$.result.contentList[*]",
          to:   collected.admin_content_states,
          transform: extract_content_state_list }
    on_success: branch_remark_technical_issue
    on_error:
      any: resolution_generic_error
    timeout_ms: 8000

  # Remark 2 — Scenario A: Technical issue found again (Section 13.2.2)
  - id: branch_remark_technical_issue
    type: branch
    rules:
      - { if: "has_technical_issue(ctx.collected.admin_content_states, ctx.collected.enrollment_status)",
          then: remark_revalidate_tech_issue_confirm }
    default: remark_pending_resources_found

  - id: remark_revalidate_tech_issue_confirm
    type: message
    prompt:
      text: |
        Upon revalidation, we found some **technical issues** affecting your progress for **{{ ctx.collected.course_name }}**.

        We can raise a support ticket for further investigation.

        Kindly confirm whether you would like us to proceed.
    quick_replies:
      - { id: yes, label: "✅ Yes, please raise a ticket" }
      - { id: no,  label: "❌ No, thank you" }
    disable_input: true
    on_reply:
      yes: technical_issue_collect_email
      no:  technical_issue_declined

  # Remark 2 — Scenario B: Pending resources found (Section 13.2.3)
  - id: remark_pending_resources_found
    type: message
    prompt:
      text: |
        Upon revalidation, we found that the following resource(s) are still **incomplete**:

        {{ ctx.collected.incomplete_resource_names }}

        Kindly complete the above resource(s) to achieve **100% completion** and enable certificate generation.
    next: satisfied

  # Remark 3 — Failed (Section 13.3)
  - id: remark_failed
    type: message
    prompt:
      text: |
        Upon checking, we found that the issue could not be resolved successfully.

        The issue has been shared with the concerned team for further investigation.

        We apologise for the inconvenience. Please feel free to reach out if you require any further assistance.
    next: satisfied

  # ===========================================================================
  # Post-resolution check
  # ===========================================================================
  - id: progress_resolution_check
    type: message
    prompt:
      text: "Did this resolve your course progress issue?"
    quick_replies:
      - { id: yes, label: "✅ Yes, resolved" }
      - { id: no,  label: "❌ No, still facing issue" }
    disable_input: true
    on_reply:
      yes: satisfied
      no:  progress_collect_email

  # ===========================================================================
  # Escalation — collect email then auto-generate ticket
  # ===========================================================================
  - id: progress_collect_email
    type: collect
    prompt:
      text: "I'll raise a support ticket for you. Please enter your **registered email address**:"
    field:
      name: collected.user_email
      type: email
      validation:
        pattern:   "^[\\w.+-]+@[\\w-]+\\.[a-z]{2,}$"
        error_msg: "That doesn't look like a valid email. Please try again."
    next: progress_auto_ticket

  - id: progress_auto_ticket
    type: transfer_llm
    auto_raise: true
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user has a course/program/event progress issue that was not resolved through self-service.
        Generate a Zoho support ticket AND update the Engineering Excel with:
          - User ID: {{ ctx.user_id_hash }}
          - Program / Course / Event DO_ID: {{ ctx.collected.course_id }}
          - Content DO_ID: {{ ctx.collected.content_do_id }}
        Subject: "Course Progress Issue — <course_name>"
        Description: include course_name, course_id, completion_pct,
          incomplete_resource_names, has_scorm_resources, all_resources_assessment,
          admin_content_states mismatch details (if any), and user_email.
        Summary of resolution steps attempted.
      engineering_excel_update:
        user_id:        "{{ ctx.user_id_hash }}"
        do_id:          "{{ ctx.collected.course_id }}"
        content_do_id:  "{{ ctx.collected.content_do_id }}"
      priority_override: P3
    on_complete: confirm_ticket

  # Generic API error fallback — transient errors only; no ticket escalation here.
  # The user can retry by selecting a different content or restarting the flow.
  - id: resolution_generic_error
    type: message
    prompt:
      text: |
        I'm having trouble fetching your details right now. This is usually a temporary issue.

        Please **try again in a few minutes** by starting this flow again.
    next: satisfied


  # ===========================================================================
  # Section 14 — Closure
  # ===========================================================================
  - id: progress_updated_end
    type: message
    prompt:
      text: |
        That's great! 🎉

        Please remember: the course must be **100% complete** for the certificate to be generated automatically.

        Once all mandatory resources are completed successfully, the certificate will be generated.

        Please feel free to reach out if you require any further assistance.
    next: satisfied

  - id: progress_pending_end
    type: message
    prompt:
      text: |
        No problem! Please complete the pending resource(s) at your convenience.

        **Important:** Kindly complete all pending resources to achieve **100% completion**. Once all mandatory resources are completed successfully, the certificate will be generated automatically.

        If the issue persists, please start a new session and choose **Course / Program / Event progress issue**.
    next: satisfied