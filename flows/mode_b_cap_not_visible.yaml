# =============================================================================
# MODE B — DETERMINISTIC
# =============================================================================
# Flow: CAP Not Visible
#
# SOP:  Comprehensive Assessment Program (CAP) not visible
# APIs: GET /api/user/private/v1/read/{userId}
# =============================================================================

flow_id: CAP_NOT_VISIBLE
flow_type: deterministic_with_llm_fallback
version: 1

metadata:
  category:         course
  menu_label:       "📋 CAP not visible"
  menu_group:       "Learning"
  menu_order:       7
  classification:   Query
  default_portal:   Learner Portal
  default_priority: P3
  default_severity: Sev 3

enabled_channels: [web]

classification:
  triggers:
    - "CAP not visible"
    - "cannot see CAP"
    - "Comprehensive Assessment Program missing"
    - "unable to enroll in CAP"
    - "not eligible for CAP"
    - "wrong CAP assigned"
    - "final assessment locked in cap"
    - "assessment not opening"

entry_node: ask_cap_issue_type

imports:
  - fragment: _mdo_admin_lookup
  - fragment: _yp_lookup
  - fragment: _zoho_ticket
    with:
      cf_category: assessment
      cf_sub_category: other
      cf_flow_id: CAP_NOT_VISIBLE
  - fragment: _enrollment_picker
    with:
      node_id:       pick_cap_for_limit
      prompt_text:   "Kindly search and select the relevant Course / Program / Event for which you are facing the issue:"
      field_name:    course_id
      field_prefix:  ""
      next:          branch_on_cap_limit_certificate
  - _terminal

nodes:
  - id: ask_cap_issue_type
    type: message
    prompt:
      text: |
        Please select the issue you are facing with the Comprehensive Assessment Program (CAP):
    quick_replies:
      - { id: cap_not_visible, label: "👁️ CAP is not visible on dashboard" }
      - { id: cap_enrollment_issue, label: "📝 Unable to enroll / Incorrect CAP" }
      - { id: cap_assessment_locked, label: "🔒 Final Assessment locked in CAP" }
      - { id: cap_assessment_limit, label: "🚫 Assessment Limit Exceeded" }
    disable_input: true
    on_reply:
      save_to: collected.cap_issue_type
      next: branch_from_cap_issue_type

  - id: branch_from_cap_issue_type
    type: branch
    rules:
      - { if: "ctx.collected.cap_issue_type == 'cap_assessment_limit'", then: pick_cap_for_limit }
    default: fetch_user_profile

  - id: fetch_user_profile
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/user/private/v1/read/{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.response.channel",                                        to: collected.org_channel }
      - { from: "$.response.rootOrgId",                                      to: collected.root_org_id }
      - { from: "$.response.organisations[0].orgName",                       to: collected.org_name }
      - { from: "$.response.profileDetails.verifiedKarmayogi",               to: collected.profile_verified }
      - { from: "$.response.profileDetails.profileStatus",                   to: collected.profile_status }
      - { from: "$.response.profileDetails.professionalDetails[0].designation", to: collected.user_designation }
      - { from: "$.response.profileDetails.professionalDetails[0].group",       to: collected.user_group }
      - { from: "$.response.profileDetails.cadreDetails",                    to: collected.cadre_details }
      - { from: "$.response.profileDetails.serviceDetails",                  to: collected.service_details }
      - { from: "$.response.profileDetails.batch",                           to: collected.batch_details }
      - { from: "$.response.profileDetails.centralDeputation",               to: collected.central_deputation }
    on_success: branch_on_issue_type_after_profile
    on_error:
      any: api_error_escalation
    timeout_ms: 5000

  - id: branch_on_issue_type_after_profile
    type: branch
    rules:
      - if: "ctx.collected.cap_issue_type == 'cap_assessment_locked'"
        then: fetch_assigned_courses
    default: branch_on_profile_verified

  - id: branch_on_profile_verified
    type: branch
    rules:
      - if: >
          (ctx.collected.profile_status or '').upper() == 'VERIFIED'
          or str(ctx.collected.profile_verified).lower() == 'true'
        then: branch_on_service_details
    default: show_not_verified

  - id: show_not_verified
    type: resolution
    prompt:
      text: |
        We found that your profile is currently **not verified**. 
        To access the Comprehensive Assessment Program (CAP), your profile verification must be completed first.
        
        Please follow the steps below:
    steps:
      - "Log in to **iGOT Karmayogi**."
      - "Click on **View Profile** from the top-right menu."
      - "Navigate to **Primary Details** and click the ✏️ **Edit (pen) icon**."
      - "Update your details and click **Send for Approval**."
      - "The request will be sent to your **MDO Admin** for approval."
    next: closure_not_verified

  - id: closure_not_verified
    type: message
    prompt:
      text: |
        Once the profile is successfully verified, please check the Comprehensive Assessment Program (CAP) again.

        Please feel free to reach out if you require any further assistance.
    next: satisfied

  - id: branch_on_service_details
    type: branch
    rules:
      - if: >
          ctx.collected.cadre_details != None
          and ctx.collected.service_details != None
          and ctx.collected.batch_details != None
          and ctx.collected.central_deputation != None
        then: show_full_details
    default: show_limited_details

  - id: show_full_details
    type: message
    prompt:
      text: |
        Upon checking, we found the following details in your profile:

        - **Organization:** {{ ctx.collected.org_name or ctx.collected.org_channel }}
        - **Designation:** {{ ctx.collected.user_designation }}
        - **Group:** {{ ctx.collected.user_group }}
        - **Cadre:** {{ ctx.collected.cadre_details }}
        - **Service:** {{ ctx.collected.service_details }}
        - **Batch:** {{ ctx.collected.batch_details }}

        Kindly confirm whether the above details are correct.
    quick_replies:
      - { id: yes, label: "✅ Yes, details are correct" }
      - { id: no,  label: "❌ No, details are incorrect" }
    disable_input: true
    on_reply:
      yes: fetch_assigned_courses
      no: ask_incorrect_field_full

  - id: fetch_assigned_courses
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/supportportal/admin/user/v2/assignedcourses/{{ ctx.user_id_hash }}"
      headers:
        x-authenticated-user-token: ""
      body:
        courseCategory: "Comprehensive Assessment Program"
    response_mapping:
      - { from: "$.count", to: collected.cap_count }
      - { from: "$.content", to: collected.all_caps }
      - { from: "$.content[0].identifier", to: collected.cap_id }
      - { from: "$.content[0].name", to: collected.cap_name }
      - { from: "$.content[0].endDate", to: collected.cap_end_date }
    on_success: branch_cap_assignment
    on_error:
      400: cap_not_assigned_message
      any: api_error_escalation
    timeout_ms: 5000

  - id: branch_cap_assignment
    type: branch
    rules:
      - if: "not has(ctx.collected.all_caps)"
        then: cap_not_assigned_message
    default: branch_on_issue_type

  - id: branch_on_issue_type
    type: branch
    rules:
      - if: "ctx.collected.cap_issue_type == 'cap_assessment_locked'"
        then: fetch_all_enrollments
      - if: "ctx.collected.cap_issue_type == 'cap_not_visible'"
        then: branch_cap_due_date
    default: confirm_expected_cap

  - id: branch_cap_due_date
    type: branch
    rules:
      - if: "has(ctx.collected.cap_end_date) and hours_since(ctx.collected.cap_end_date) > 0" 
        then: cap_expired_message
    default: confirm_expected_cap

  - id: cap_not_assigned_message
    type: message
    prompt:
      text: |
        Upon checking, we found that no Comprehensive Assessment Program (CAP) is currently assigned to your profile. 

        CAP creation and assignment are managed by the concerned department.
    next: lookup_mdo_admin

  - id: cap_expired_message
    type: message
    prompt:
      text: |
        Upon checking, we found the following Comprehensive Assessment Program (CAP) assignments for your profile:

        {% for cap in ctx.collected.all_caps %}
        - **CAP Name:** {{ cap.name | default('Not Available') }}
          **Due Date:** {{ cap.endDate | default('Not Available') }}
          **CAP Link:** https://portal.uat.karmayogibharat.net/app/toc/{{ cap.identifier }}/overview
        {% endfor %}

        Since the due date has passed for your CAP, it may no longer be visible on your dashboard. 

        Kindly search for the CAP using the search bar on the iGOT Karmayogi portal and continue the assessment. 
    next: satisfied

  - id: confirm_expected_cap
    type: message
    prompt:
      text: |
        Upon checking, we found the following Comprehensive Assessment Program (CAP) assignments for your profile:
        
        {% for cap in ctx.collected.all_caps %}
        - **CAP Name:** {{ cap.name | default('Not Available') }}
          **Due Date:** {{ cap.endDate | default('Not Available') }}
          **CAP Link:** https://portal.uat.karmayogibharat.net/app/toc/{{ cap.identifier }}/overview
        {% endfor %}
        
        Kindly confirm whether the CAP you were expecting is in this list.
    quick_replies:
      - { id: yes, label: "✅ Yes" }
      - { id: no,  label: "❌ No" }
    disable_input: true
    on_reply:
      yes: cap_active_message
      no: cap_incorrect_message

  - id: cap_incorrect_message
    type: message
    prompt:
      text: |
        CAP assignment is managed by the concerned department. 

        If you believe that an incorrect Comprehensive Assessment Program (CAP) has been assigned to your profile, kindly connect with your department MDO for further verification and necessary changes.
    next: lookup_mdo_admin

  - id: cap_active_message
    type: message
    prompt:
      text: |
        Thank you for your confirmation. 
        
        Kindly use the link(s) provided above to access and continue your Comprehensive Assessment Program.
        
        We wish you the best for your assessment!
    next: satisfied

  - id: ask_incorrect_field_full
    type: message
    prompt:
      text: |
        Kindly let us know which of the following details are incorrect:
    quick_replies:
      - { id: org, label: "🏢 Organization" }
      - { id: desig, label: "📋 Designation" }
      - { id: group, label: "👥 Group" }
      - { id: cadre, label: "🏛️ Cadre" }
      - { id: service, label: "🎖️ Service" }
      - { id: batch, label: "📅 Batch" }
      - { id: deputation, label: "🏢 Central Deputation" }
    disable_input: true
    on_reply:
      org: guide_transfer_request
      desig: guide_designation_update
      group: guide_profile_update
      cadre: guide_profile_update
      service: guide_profile_update
      batch: guide_profile_update
      deputation: guide_profile_update

  - id: ask_all_india_service
    type: message
    prompt:
      text: |
        Kindly confirm whether you belong to any of the following All India Services:
        - IAS
        - IPS
        - IFS
    quick_replies:
      - { id: yes, label: "🏛️ Yes" }
      - { id: no,  label: "🏢 No" }
    disable_input: true
    on_reply:
      yes: inform_missing_service_details
      no: fetch_assigned_courses

  - id: inform_missing_service_details
    type: message
    prompt:
      text: |
        We found that the following mandatory service-related details are missing from your profile:

        {% if not ctx.collected.cadre_details %}- Cadre Details
        {% endif %}{% if not ctx.collected.service_details %}- Service Details
        {% endif %}{% if not ctx.collected.batch_details %}- Batch Information
        {% endif %}{% if not ctx.collected.central_deputation %}- Central Deputation Details{% endif %}

        Kindly update the required details in your profile. Once the profile has been updated successfully, please wait for approximately **4 hours** and then check whether the Comprehensive Assessment Program (CAP) is visible.

        Please feel free to reach out if you require any further assistance.
    next: satisfied

  - id: show_limited_details
    type: message
    prompt:
      text: |
        Upon checking, we found the following details in your profile:

        - **Organization:** {{ ctx.collected.org_name or ctx.collected.org_channel }}
        - **Designation:** {{ ctx.collected.user_designation }}
        - **Group:** {{ ctx.collected.user_group }}

        Kindly confirm whether the above details are correct.
    quick_replies:
      - { id: yes, label: "✅ Yes, details are correct" }
      - { id: no,  label: "❌ No, details are incorrect" }
    disable_input: true
    on_reply:
      yes: ask_all_india_service
      no: ask_incorrect_field_limited

  - id: ask_incorrect_field_limited
    type: message
    prompt:
      text: |
        Kindly let us know which of the following details are incorrect:
    quick_replies:
      - { id: org, label: "🏢 Organization" }
      - { id: desig, label: "📋 Designation" }
      - { id: group, label: "👥 Group / Other" }
    disable_input: true
    on_reply:
      org: guide_transfer_request
      desig: guide_designation_update
      group: guide_profile_update

  - id: guide_transfer_request
    type: resolution
    prompt:
      text: |
        🏢 **Update Organization — Raise a Transfer Request**
        
        Follow the steps below to raise a Transfer Request:
    steps:
      - "Log in to iGOT Karmayogi."
      - "Click on the **Profile Icon** and select **View Profile**."
      - "Select **Make Transfer Request**."
      - "Select the Correct Organization Name and update Group/Designation if needed."
      - "Submit the request."
    next: closure_after_update

  - id: guide_designation_update
    type: resolution
    prompt:
      text: |
        📋 **Update Designation**
        
        Follow the steps below to update your designation:
    steps:
      - "Log in to iGOT Karmayogi."
      - "Click on the **Profile Icon** and select **View Profile**."
      - "Navigate to **Primary Details** and click the ✏️ **Edit (pen) icon**."
      - "Update your Designation and click **Send for Approval**."
    next: closure_after_update

  - id: guide_profile_update
    type: resolution
    prompt:
      text: |
        👥 **Update Profile Details**
        
        Follow the steps below to update your profile details:
    steps:
      - "Log in to iGOT Karmayogi."
      - "Click on the **Profile Icon** and select **View Profile**."
      - "Navigate to **Primary Details** and click the ✏️ **Edit (pen) icon**."
      - "Update the incorrect fields and click **Send for Approval**."
    next: closure_after_update

  - id: closure_after_update
    type: message
    prompt:
      text: |
        Once you have updated the required details, please check if the Comprehensive Assessment Program (CAP) is visible again after the profile changes are reflected.

        Please feel free to reach out if you require any further assistance.
    next: satisfied

  - id: api_error_escalation
    type: message
    prompt:
      text: |
        I encountered a technical issue while checking your profile. 
        Please try again later or contact support.
    next: satisfied

  - id: mdo_found_result
    type: branch
    rules:
      - if: "ctx.collected.mdo_admin_count != None and ctx.collected.mdo_admin_count > 0"
        then: mdo_contact_message
    default: lookup_yp_contact

  - id: mdo_contact_message
    type: message
    prompt:
      text: |
        Kindly connect with the below contact for further assistance regarding CAP creation and assignment:
        
        Name: **{{ ctx.collected.mdo_admin_name }}**
        Email ID: **{{ ctx.collected.mdo_admin_email }}**
    next: satisfied

  - id: mdo_api_error
    type: message
    prompt:
      text: "MDO Admin details could not be retrieved. Let me check for the YP/AM contact for your organization."
    next: lookup_yp_contact

  - id: yp_found_result
    type: message
    prompt:
      text: |
        Kindly connect with the below contact for further assistance regarding CAP creation and assignment:
        
        Name: **{{ ctx.collected.yp_name }}**
        Email ID: **{{ ctx.collected.yp_email }}**
    next: satisfied

  - id: yp_not_found
    type: message
    prompt:
      text: |
        We were unable to retrieve the MDO Admin or YP/AM contact details for your organization at this time.
        Kindly reach out to your concerned authority for further assistance.
    next: satisfied

  # ===========================================================================
  # Final Assessment Locked in CAP - Subcase 3
  # ===========================================================================
  - id: fetch_all_enrollments
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/course/private/v4/user/enrollment/list/{{ ctx.user_id_hash }}"
      body:
        request:
          filters:
            status: ["0", "1", "2"]
    response_mapping:
      - { from: "$.courses", to: collected.all_enrollment_list }
    on_success: fetch_cap_hierarchy
    on_error:
      any: api_error_escalation
    timeout_ms: 8000

  - id: cap_not_enrolled_message
    type: message
    prompt:
      text: |
        Upon checking, we found that the assigned Comprehensive Assessment Program (CAP) is not yet enrolled.

        Kindly enroll in the assigned CAP to unlock the Final Assessment:
        {% for cap in ctx.collected.all_caps | default([]) %}
          {% set ns = namespace(enrolled=false) %}
          {% for enroll in ctx.collected.all_enrollment_list | default([]) %}
            {% if enroll.courseId == cap.identifier %}
              {% set ns.enrolled = true %}
            {% endif %}
          {% endfor %}
          {% if not ns.enrolled %}
          - [{{ cap.name | default('Assigned CAP') }}](https://portal.uat.karmayogibharat.net/app/toc/{{ cap.identifier }}/overview)
          {% endif %}
        {% endfor %}
    next: satisfied

  - id: fetch_cap_hierarchy
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/private/content/v3/hierarchy/{% set ns = namespace(cap_id='') %}{% for cap in ctx.collected.all_caps | default([]) %}{% for enroll in ctx.collected.all_enrollment_list | default([]) %}{% if enroll.courseId == cap.identifier %}{% set ns.cap_id = cap.identifier %}{% endif %}{% endfor %}{% endfor %}{{ ns.cap_id }}"
    response_mapping:
      - { from: "$.content.children", to: collected.cap_hierarchy_children }
    on_success: evaluate_child_courses
    on_error:
      any: cap_not_enrolled_message
    timeout_ms: 8000

  - id: evaluate_child_courses
    type: message
    prompt:
      text: |
        {% set ns_global = namespace(has_incomplete=false) %}
        
        {# Check child courses #}
        {% set child_count = ctx.collected.cap_hierarchy_children | default([]) | length %}
        {% if child_count > 0 %}
          {% for child in ctx.collected.cap_hierarchy_children | default([]) %}
            {% if "assessment" not in child.name | default('') | lower %}
              {% set ns = namespace(complete=false) %}
              {% set enroll_data = namespace(val=None) %}
              {% for enroll in ctx.collected.all_enrollment_list | default([]) %}
                {% if enroll.courseId == child.identifier %}
                  {% set enroll_data.val = enroll %}
                  {% if enroll.status == 2 or enroll.completionPercentage == 100 or (enroll.issuedCertificates and enroll.issuedCertificates | length > 0) %}
                    {% set ns.complete = true %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {% if not ns.complete %}
                {% set ns_global.has_incomplete = true %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% else %}
          {# If no child courses, check the CAP's own enrollment #}
          {% for cap in ctx.collected.all_caps | default([]) %}
            {% for enroll in ctx.collected.all_enrollment_list | default([]) %}
              {% if enroll.courseId == cap.identifier and enroll.status != 2 and enroll.completionPercentage != 100 and not (enroll.issuedCertificates and enroll.issuedCertificates | length > 0) %}
                {% set ns_global.has_incomplete = true %}
              {% endif %}
            {% endfor %}
          {% endfor %}
        {% endif %}

        {% if ns_global.has_incomplete %}
        We found that the following resources are still incomplete:
        
        {% set count = namespace(val=0) %}
        {% if child_count > 0 %}
          {% for child in ctx.collected.cap_hierarchy_children | default([]) %}
            {% if "assessment" not in child.name | default('') | lower %}
              {% set ns = namespace(complete=false) %}
              {% set enroll_data = namespace(val=None) %}
              {% for enroll in ctx.collected.all_enrollment_list | default([]) %}
                {% if enroll.courseId == child.identifier %}
                  {% set enroll_data.val = enroll %}
                  {% if enroll.status == 2 or enroll.completionPercentage == 100 or (enroll.issuedCertificates and enroll.issuedCertificates | length > 0) %}
                    {% set ns.complete = true %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {% if not ns.complete %}
                {% set count.val = count.val + 1 %}
        {{ count.val }}. [{{ child.name }}](https://portal.uat.karmayogibharat.net/app/toc/{{ child.identifier }}/overview)
                {% set res_ns = namespace(found=false) %}
                {% if enroll_data.val and enroll_data.val.langContentStatus %}
                  {% for module in child.children | default([]) %}
                    {% set is_leaf = (module.children | default([]) | length == 0) %}
                    {% if is_leaf %}
                      {% set res_complete = namespace(val=false) %}
                      {% for lang, status_map in enroll_data.val.langContentStatus.items() %}
                        {% if status_map.get(module.identifier) == 2 %}
                          {% set res_complete.val = true %}
                        {% endif %}
                      {% endfor %}
                      {% if not res_complete.val %}
           - **Pending:** {{ module.name }}
                        {% set res_ns.found = true %}
                      {% endif %}
                    {% else %}
                      {% for resource in module.children | default([]) %}
                        {% set res_complete = namespace(val=false) %}
                        {% for lang, status_map in enroll_data.val.langContentStatus.items() %}
                          {% if status_map.get(resource.identifier) == 2 %}
                            {% set res_complete.val = true %}
                          {% endif %}
                        {% endfor %}
                        {% if not res_complete.val %}
           - **Pending:** {{ resource.name }}
                          {% set res_ns.found = true %}
                        {% endif %}
                      {% endfor %}
                    {% endif %}
                  {% endfor %}
                {% else %}
                  {% for module in child.children | default([]) %}
                    {% set is_leaf = (module.children | default([]) | length == 0) %}
                    {% if is_leaf %}
           - **Pending:** {{ module.name }}
                      {% set res_ns.found = true %}
                    {% else %}
                      {% for resource in module.children | default([]) %}
           - **Pending:** {{ resource.name }}
                        {% set res_ns.found = true %}
                      {% endfor %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
                {% if not res_ns.found %}
           - **Pending:** Complete remaining modules
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% else %}
          {% for cap in ctx.collected.all_caps | default([]) %}
        1. [{{ cap.name | default('Assigned CAP') }}](https://portal.uat.karmayogibharat.net/app/toc/{{ cap.identifier }}/overview)
           - **Pending:** Complete remaining modules
          {% endfor %}
        {% endif %}
        
        The Final Assessment will be unlocked only after all mandatory resources and child courses are completed successfully.
        
        **Steps to Identify Pending Resources:**
        1. Login to the **iGOT Karmayogi** portal.
        2. Navigate to **Profile**.
        3. Open **My Learning**.
        4. Open the **In Progress** section.
        5. Open the respective course mentioned above.
        6. Click **Resume**.
        7. Expand every module using the **"+"** icon.
        8. Identify resources that do not have a **Blue Tick**.
        9. Complete all pending resources until every item shows a **Blue Tick**.
        {% else %}
        Upon checking, we found that all prerequisite courses have been completed successfully.
        
        If the Final Assessment is still showing as locked, please click **"🔒 Still locked"** below so we can help you troubleshoot (e.g., mobile access workarounds, attempt limits, or raising a support ticket).
        {% endif %}
    quick_replies:
      - { id: incomplete_ack, label: "👍 Got it" }
      - { id: locked, label: "🔒 Still locked" }
    disable_input: true
    on_reply:
      incomplete_ack: satisfied
      locked: final_assessment_locked_options

  - id: final_assessment_locked_options
    type: message
    prompt:
      text: |
        If you are unable to access or attempt the Final Assessment, please let me know what kind of issue you are facing:
    quick_replies:
      - { id: mobile, label: "📱 Unable to complete from Mobile" }
      - { id: other, label: "⚠️ Any Other Error" }
    disable_input: true
    on_reply:
      mobile: cap_assessment_mobile_guidance
      other: cap_other_error_screenshot_guidance

  # ---------------------------------------------------------------------------
  # Option 1 — Unable to Complete Assessment from Mobile
  # ---------------------------------------------------------------------------
  - id: cap_assessment_mobile_guidance
    type: message
    prompt:
      text: |
        Kindly try completing the assessment through the web portal by following the below steps:

        1. Open **Google Chrome** or any web browser.
        2. Search for **iGOT Karmayogi**.
        3. Open the **iGOT Karmayogi Portal**.
        4. From the browser menu, enable **Desktop Site**.
        5. Log in using your credentials.
        6. Navigate to **My Learning**.
        7. Open the relevant Course / Program / Event.
        8. Click **Resume**.
        9. Open the assessment and complete it.
    quick_replies:
      - { id: yes, label: "✅ Yes, completed successfully" }
      - { id: no,  label: "❌ No, still facing issue" }
    disable_input: true
    on_reply:
      yes: satisfied
      no: cap_other_error_screenshot_guidance

  # ---------------------------------------------------------------------------
  # Option 2 — Assessment Limit Exceeded
  # ---------------------------------------------------------------------------
  - id: cap_assessment_limit_exceeded
    type: message
    prompt:
      text: |
        We will verify the assessment attempt details and raise a support ticket for further investigation.

        The concerned team will check whether the assessment attempt limit has been exceeded and take the necessary action.
    next: cap_raise_ticket_prompt

  # ---------------------------------------------------------------------------
  # Option 3 — Any Other Error
  # ---------------------------------------------------------------------------
  - id: cap_other_error_screenshot_guidance
    type: message
    prompt:
      text: |
        We will raise a support ticket for further investigation.

        📸 **Please keep a screenshot of the error ready.** Our support agent will reach out to your registered email and may request it to help resolve your issue faster.
    next: cap_raise_ticket_prompt

  # ---------------------------------------------------------------------------
  # Ticket Raising
  # ---------------------------------------------------------------------------
  - id: cap_raise_ticket_prompt
    type: collect
    prompt:
      text: "Please provide your **registered email address** so we can raise a support ticket:"
    field:
      name: collected.user_email
      type: email
      validation:
        pattern: "^[\\w.+-]+@[\\w-]+\\.[a-z]{2,}$"
        error_msg: "Please enter a valid email address."
    next: cap_auto_ticket

  - id: cap_auto_ticket
    type: transfer_llm
    auto_raise: true
    llm_context:
      include_messages: true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user has reported a technical issue or locked Final Assessment within their CAP.
        Generate a Zoho support ticket.
        Subject: "CAP Final Assessment Issue - <org_name>"
        Description: include the user email, the issue they reported (limit exceeded, technical issue, etc), and the CAP name.
      priority_override: P3
    on_complete: confirm_ticket

  # ===========================================================================
  # Assessment Limit Exceeded - Validation Flow
  # ===========================================================================
  - id: branch_on_cap_limit_certificate
    type: branch
    rules:
      - { if: "ctx.collected.completion_pct == 100", then: resolution_cap_already_complete }
    default: api_read_cap_course_content

  - id: resolution_cap_already_complete
    type: message
    prompt:
      text: |
        Our records show that **{{ ctx.collected.course_name }}** is already marked as **100% complete** and the certificate is generated (if applicable).
        
        If your progress isn't reflecting correctly, please try logging out and logging back in.
    next: satisfied

  - id: api_read_cap_course_content
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/content/v1/read/{{ ctx.collected.course_id }}"
    response_mapping:
      - from: "$.content.leafNodes"
        to: collected.incomplete_ids
        transform: diff_leaf_nodes
        transform_ctx_key: collected.completed_ids
    on_success: branch_on_cap_leaf_ids_available
    on_error:
      any: api_fetch_cap_resource_metadata
    timeout_ms: 8000

  - id: branch_on_cap_leaf_ids_available
    type: branch
    rules:
      - { if: "len(ctx.collected.incomplete_ids) == 0", then: resolution_cap_already_complete }
    default: api_fetch_cap_resource_metadata

  - id: api_fetch_cap_resource_metadata
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/content/v1/search"
      body:
        request:
          filters:
            identifier: "{{ ctx.collected.incomplete_ids }}"
          isSecureSettingsDisabled: true
          sort_by:
            createdOn: "desc"
          fields: ["identifier", "name", "mimeType", "status", "duration", "primaryCategory"]
          facets: ["status"]
          limit: 1000
    response_mapping:
      - { from: "$.content[*].name",  to: collected.incomplete_resource_names,    transform: extract_all_names }
      - { from: "$.content[*].mimeType", to: collected.has_scorm_resources,        transform: detect_scorm }
      - { from: "$.content[*]",        to: collected.scorm_resource_name,          transform: extract_scorm_resource_name }
      - { from: "$.content[*]",        to: collected.scorm_resource_duration_min,  transform: extract_scorm_duration_minutes }
      - { from: "$.content[*]",        to: collected.all_resources_assessment,     transform: detect_assessment_only }
    on_success: branch_on_cap_resource_type
    on_error:
      any: resolution_cap_generic_error
    timeout_ms: 8000

  - id: branch_on_cap_resource_type
    type: branch
    rules:
      - { if: "ctx.collected.all_resources_assessment == true", then: api_check_assessment_limit }
      - { if: "ctx.collected.has_scorm_resources == true",      then: cap_limit_resolution_scorm_guidance }
    default: cap_limit_resolution_non_scorm_guidance

  - id: api_check_assessment_limit
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/admin/assesment/retake/count?assessmentIdentifier={{ ctx.collected.incomplete_ids[0] }}&userId={{ ctx.user_id }}&editMode=false"
    response_mapping:
      - { from: "$.attemptsMade", to: collected.attempts_made }
      - { from: "$.attemptsAllowed", to: collected.attempts_allowed }
    on_success: branch_on_assessment_limit
    on_error:
      any: cap_assessment_limit_exceeded
    timeout_ms: 8000

  - id: branch_on_assessment_limit
    type: branch
    rules:
      - if: "has(ctx.collected.attempts_allowed) and has(ctx.collected.attempts_made) and (int(ctx.collected.attempts_allowed) - int(ctx.collected.attempts_made) > 0)"
        then: resolution_assessment_attempts_remaining
    default: cap_assessment_limit_exceeded

  - id: resolution_assessment_attempts_remaining
    type: message
    prompt:
      text: |
        Upon verification, you still have **{{ int(ctx.collected.attempts_allowed) - int(ctx.collected.attempts_made) }} attempt(s)** remaining for this assessment.
        
        Kindly navigate to the course and retry the assessment.
    next: satisfied

  - id: cap_limit_resolution_scorm_guidance
    type: resolution
    prompt:
      text: |
        The resource titled **“{{ ctx.collected.scorm_resource_name }}”** is still **In Progress** or **Not Started**.

        This resource is in **SCORM format**. Please note:
        - The course is meant to be understood and completed in **one session**.
        - If you try to increase the playback speed, your progress may **not be recorded correctly**.
        - If the resource duration is **{{ ctx.collected.scorm_resource_duration_min }} minutes**, you must spend at least **{{ ctx.collected.scorm_resource_duration_min }} minutes** on it.
        
        At the end, click the **“Next”** button in the upper-right corner to move to the next resource. Only then will the progress reflect as completed.
    steps:
      - "Go to **Profile** → **My Learning** → **In Progress**"
      - "Open **{{ ctx.collected.course_name }}** and click **Resume**"
      - "Expand each module (click the **+** icon) and find items without a blue tick"
      - "Complete them properly in one session"
    follow_up:
      text: "Were you able to complete the pending resource?"
      quick_replies:
        - { id: YES,     label: "✅ Yes, completed successfully" }
        - { id: NO,      label: "❌ No, still facing issue" }
    on_reply:
      YES: satisfied
      NO: cap_child_course_technical_message

  - id: cap_limit_resolution_non_scorm_guidance
    type: resolution
    prompt:
      text: |
        The following resources are still **In Progress** or **Not Started** in **{{ ctx.collected.course_name }}**:

        {{ ctx.collected.incomplete_resource_names }}

        Kindly revisit the course and complete these resources to achieve 100% completion.
    steps:
      - "Go to **Profile** → **My Learning** → **In Progress**"
      - "Open **{{ ctx.collected.course_name }}** and click **Resume**"
      - "Expand each module (click the **+** icon)"
      - "Complete any items without a blue tick"
    follow_up:
      text: "Were you able to complete the pending resources?"
      quick_replies:
        - { id: YES,     label: "✅ Yes, completed successfully" }
        - { id: NO,      label: "❌ No, still facing issue" }
    on_reply:
      YES: satisfied
      NO: cap_child_course_technical_message

  # ===========================================================================
  # Child Course Technical Issue & Engineering Excel
  # ===========================================================================
  - id: cap_child_course_technical_message
    type: message
    prompt:
      text: |
        Upon checking, we found a technical issue affecting one or more child courses under your Comprehensive Assessment Program (CAP). 

        We will raise a support ticket for further investigation. The technical team will review this and update the Engineering Excel in the backend accordingly.
    next: cap_raise_ticket_prompt_technical

  - id: cap_raise_ticket_prompt_technical
    type: collect
    prompt:
      text: "Please provide your **registered email address** so we can raise a support ticket:"
    field:
      name: collected.user_email
      type: email
      validation:
        pattern: "^[\\w.+-]+@[\\w-]+\\.[a-z]{2,}$"
        error_msg: "Please enter a valid email address."
    next: cap_child_course_technical_ticket

  - id: cap_child_course_technical_ticket
    type: transfer_llm
    auto_raise: true
    llm_context:
      include_messages: true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user has reported a technical issue affecting a child course under their CAP.
        Generate a Zoho support ticket.
        Subject: "CAP Child Course Technical Issue - <org_name>"
        Description: include the user email, the CAP name, and clearly state that a child course has a technical issue and needs to be updated in the Engineering Excel in the backend.
      priority_override: P3
    on_complete: confirm_ticket

  - id: resolution_cap_generic_error
    type: message
    prompt:
      text: |
        I'm having trouble fetching the course details right now.
        
        If the issue persists, we can raise a support ticket.
    quick_replies:
      - { id: raise, label: "📋 Raise a ticket" }
      - { id: skip,  label: "❌ I'll try later" }
    disable_input: true
    on_reply:
      raise: cap_raise_ticket_prompt
      skip:  satisfied

