fragment_id: multiple_account
# =============================================================================
# Shared Fragment: Multiple Account — Email ID / Mobile Number Update
# =============================================================================
# Reusable by any flow that needs to handle email/mobile identifier conflicts.
#
# The importing flow MUST also import:
#   - _terminal         (provides: satisfied, ticket_raised_end)
#   - _yp_lookup        (provides: lookup_yp_contact → yp_found_result / yp_not_found)
#   - _zoho_ticket      (provides: confirm_ticket → ticket_confirmation → ticket_raised_end)
#
# The importing flow must also define (inline, because they carry context-
# specific text — they ARE defined in this fragment with sensible defaults,
# but an importing flow can override them by declaring its own node with the
# same id before importing this fragment):
#   - yp_found_result   (shown after domain-invalid YP lookup on success)
#   - yp_not_found      (shown after domain-invalid YP lookup on error)
#
# Optional fragment param:
#   {{ params.ticket_confirm_node | default("confirm_ticket") }}
#   → the node to jump to after raise_support_ticket completes.
#     Set this when the importing flow has a different _zoho_ticket import
#     (e.g. a flow-specific ticket node), otherwise defaults to confirm_ticket.
#
# Entry point: ask_identifier_type
# =============================================================================

nodes:
  # ===========================================================================
  # STEP 1 — Collect the identifier type the user wants to update
  # ===========================================================================
  - id: ask_identifier_type
    type: message
    prompt:
      text: |
        I can help you with updating your Email ID or Mobile Number.

        Are you trying to update your **Email ID** or **Mobile Number**?
    quick_replies:
      - { id: EMAIL, label: "📧 Email ID" }
      - { id: MOBILE, label: "📱 Mobile Number" }
    disable_input: true
    on_reply:
      save_to: collected.update_type
      EMAIL: collect_new_email
      MOBILE: collect_new_mobile

  # ---------------------------------------------------------------------------
  # Collect email
  # ---------------------------------------------------------------------------
  - id: collect_new_email
    type: collect
    prompt:
      text: "Please share the **Email ID** you are trying to update to:"
    field:
      name: collected.new_identifier
      type: email
      validation:
        pattern: "^[\\w.+\\-]+@[\\w\\-]+\\.[a-z]{2,}(\\.[a-z]{2,})?$"
        error_msg: "That doesn't look like a valid email address. Please try again."
    next: validate_email_domain

  # ---------------------------------------------------------------------------
  # Collect mobile
  # ---------------------------------------------------------------------------
  - id: collect_new_mobile
    type: collect
    prompt:
      text: "Please share the **Mobile Number** you are trying to update to:"
    field:
      name: collected.new_identifier
      type: text
      validation:
        pattern: "^[6-9][0-9]{9}$"
        error_msg: "❌ Invalid format. Please enter a valid 10-digit Indian mobile number (without country code)."
    next: validate_mobile_format

  # Explicit mobile format validation (ensures no emails slip through)
  - id: validate_mobile_format
    type: branch
    rules:
      # Reject if contains @ (email detected)
      - {
          if: "'@' in ctx.collected.new_identifier",
          then: reject_invalid_mobile,
        }
      # Reject if not exactly 10 digits
      - {
          if: "len(ctx.collected.new_identifier) != 10",
          then: reject_invalid_mobile,
        }
      # Reject if doesn't start with 6-9
      - {
          if: "ctx.collected.new_identifier[0] not in ['6','7','8','9']",
          then: reject_invalid_mobile,
        }
      # Reject if contains non-digit characters
      - {
          if: "not ctx.collected.new_identifier.isdigit()",
          then: reject_invalid_mobile,
        }
    default: fetch_current_profile

  - id: reject_invalid_mobile
    type: message
    prompt:
      text: |
        ❌ That doesn't look like a valid **Mobile Number**

        This doesn't look like a valid Indian mobile number. Please ensure:
        - Exactly 10 digits
        - Starts with 6, 7, 8, or 9
        - No letters, emails, spaces, or special characters

        Please try again.
    next: collect_new_mobile

  # ===========================================================================
  # STEP 2 — Email domain validation (email path only)
  # ===========================================================================
  - id: validate_email_domain
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/user/v1/email/approvedDomains"
    response_mapping:
      - { from: "$.domains", to: collected.approved_domains }
    on_success: branch_domain_check
    on_error:
      # Cannot verify domain — treat as valid and continue
      any: fetch_current_profile
    timeout_ms: 5000

  - id: branch_domain_check
    type: branch
    rules:
      # If the approved_domains list is empty / null, treat domain as invalid
      - {
          if: "ctx.collected.approved_domains == None or len(ctx.collected.approved_domains) == 0",
          then: domain_invalid_fetch_user_profile,
        }
      # Domain check: invalid domain → MDO/YP path
      - {
          if: "email_domain_valid(ctx.collected.new_identifier, ctx.collected.approved_domains) == False",
          then: domain_invalid_fetch_user_profile,
        }
    default: fetch_current_profile

  # ---------------------------------------------------------------------------
  # Domain NOT valid — fetch user profile to get rootOrgId → MDO lookup
  # ---------------------------------------------------------------------------
  - id: domain_invalid_fetch_user_profile
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/user/private/v1/read/{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.response.rootOrgId", to: collected.root_org_id }
      - { from: "$.response.channel", to: collected.org_channel }
    on_success: domain_invalid_lookup_mdo
    on_error:
      any: domain_invalid_no_mdo
    timeout_ms: 5000

  - id: domain_invalid_lookup_mdo
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/private/user/v1/search"
      body:
        request:
          filters:
            channel: "{{ ctx.collected.org_channel }}"
            organisations.roles: ["MDO_LEADER"]
            status: 1
          limit: 1
    response_mapping:
      - { from: "$.response.count", to: collected.mdo_leader_count }
      - {
          from: "$.response.content[0].profileDetails.personalDetails.firstname",
          to: collected.mdo_leader_name,
        }
      - {
          from: "$.response.content[0].profileDetails.personalDetails.surname",
          to: collected.mdo_leader_surname,
        }
      - {
          from: "$.response.content[0].profileDetails.personalDetails.primaryEmail",
          to: collected.mdo_leader_email,
        }
      - {
          from: "$.response.content[0].firstName",
          to: collected.mdo_leader_name_fallback,
        }
      - {
          from: "$.response.content[0].email",
          to: collected.mdo_leader_email_fallback,
        }
    on_success: branch_domain_invalid_mdo_found
    on_error:
      any: lookup_yp_contact
    timeout_ms: 5000

  - id: branch_domain_invalid_mdo_found
    type: branch
    rules:
      - {
          if: "ctx.collected.mdo_leader_count != None and ctx.collected.mdo_leader_count > 0",
          then: domain_invalid_show_mdo,
        }
    default: lookup_yp_contact

  - id: domain_invalid_show_mdo
    type: message
    prompt:
      text: |
        The Email ID **{{ ctx.collected.new_identifier }}** cannot be updated because its domain is **not whitelisted** on the iGOT Karmayogi platform.

        Please contact your **MDO Leader** for further clarification and to request domain addition:

        👤 **{{ ctx.collected.mdo_leader_name or ctx.collected.mdo_leader_name_fallback }}{{ (' ' ~ ctx.collected.mdo_leader_surname) if ctx.collected.mdo_leader_surname else '' }}**
        📧 {{ ctx.collected.mdo_leader_email or ctx.collected.mdo_leader_email_fallback }}
    next: satisfied

  # ---------------------------------------------------------------------------
  # yp_found_result / yp_not_found — targets for _yp_lookup fragment's
  # lookup_yp_contact node. Defining them here (inside the fragment) means
  # the flow doesn't need to declare them separately.
  # An importing flow may override these by declaring its own node with the
  # same id before the import statement (flow-wins rule).
  # ---------------------------------------------------------------------------
  - id: yp_found_result
    type: message
    prompt:
      text: |
        The Email ID **{{ ctx.collected.new_identifier }}** cannot be updated because its domain is **not whitelisted** on the iGOT Karmayogi platform.

        Please contact your assigned **Young Professional (YP)** for further assistance:

        👤 **{{ ctx.collected.yp_name }}**
        📧 {{ ctx.collected.yp_email }}
        📞 {{ ctx.collected.yp_mobile }}
    next: satisfied

  - id: yp_not_found
    type: ticket_confirm
    prompt:
      text: |
        The Email ID **{{ ctx.collected.new_identifier }}** cannot be updated because its domain is **not whitelisted** on the iGOT Karmayogi platform, and we couldn't retrieve a YP contact for your organization at this time.

        This needs further investigation from our support team. Would you like us to create a support ticket for this issue?
    on_confirm: yp_not_found_ticket_summary
    on_cancel: satisfied

  - id: yp_not_found_ticket_summary
    type: ticket_confirm
    prompt:
      text: |
        **Issue Identified:** Domain Whitelisting — No YP Contact Found

        **Summary of Request:**
        The Email ID {{ ctx.collected.new_identifier }} cannot be updated because its domain is not whitelisted, and we could not locate a YP contact for your organization to help resolve this. You would like us to investigate this further.

        • **Organization:** {{ ctx.collected.org_channel | default('Not identified') }}
        • **Email ID to be Updated:** {{ ctx.collected.new_identifier }}

        Please review the details above and confirm whether they are correct.
    on_confirm: yp_not_found_raise_ticket
    on_cancel: satisfied

  - id: yp_not_found_raise_ticket
    type: transfer_llm
    auto_raise: silent
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user's Email ID/domain is not whitelisted on the iGOT Karmayogi platform, and no
        YP contact could be located for their organization either — so the user has no
        self-service path to resolve this.
        Generate a Zoho support ticket so the support team can manually whitelist the domain
        or identify the correct contact.
        Subject: "Domain Whitelisting — No YP Contact Found"
        Description: include the organization/channel and the Email ID/domain that needs
        whitelisting, and note that no YP contact could be found.
      priority_override: P3
    on_complete: "{{ params.ticket_confirm_node | default('confirm_ticket') }}"

  - id: domain_invalid_no_mdo
    type: message
    prompt:
      text: |
        The Email ID **{{ ctx.collected.new_identifier }}** cannot be updated because its domain is **not whitelisted** on the iGOT Karmayogi platform.

        Please contact your **MDO Leader** or the **Young Professional (YP)** assigned to your organisation for further assistance.
    next: satisfied

  # ===========================================================================
  # STEP 3 — Fetch current user's profile to compare identifier
  # ===========================================================================
  - id: fetch_current_profile
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/user/private/v1/read/{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.response.profileDetails.personalDetails.primaryEmail", to: collected.current_email }
      - { from: "$.response.profileDetails.personalDetails.mobile", to: collected.current_phone }
    on_success: check_same_identifier
    on_error:
      any: check_registration
    timeout_ms: 5000

  - id: check_same_identifier
    type: branch
    rules:
      - {
          if: "ctx.collected.update_type == 'EMAIL' and ctx.collected.new_identifier == ctx.collected.current_email",
          then: same_identifier_message,
        }
      - {
          if: "ctx.collected.update_type == 'MOBILE' and ctx.collected.new_identifier == ctx.collected.current_phone",
          then: same_identifier_message,
        }
    default: check_registration

  # ===========================================================================
  # STEP 3 — Check if the identifier is already registered
  # ===========================================================================
  - id: check_registration
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/private/user/v1/search"
      body:
        request:
          filters:
            # For email: filter key is "email"; for mobile: "phone"
            "{{ 'email' if ctx.collected.update_type == 'EMAIL' else 'phone' }}": "'{{ ctx.collected.new_identifier }}'"
    response_mapping:
      - { from: "$.response.count", to: collected.conflict_count }
      - { from: "$.response.content[0].id", to: collected.conflict_user_id }
      - {
          from: "$.response.content[0].channel",
          to: collected.conflict_org_name,
        }
      - {
          from: "$.response.content[0].rootOrgId",
          to: collected.conflict_root_org_id,
        }
    on_success: branch_registration
    on_error:
      any: registration_check_error
    timeout_ms: 15000

  - id: registration_check_error
    type: message
    prompt:
      text: |
        **Verification Temporarily Unavailable**

        We're currently unable to verify whether **{{ ctx.collected.new_identifier }}** is already registered due to a temporary issue.

        Please try again in a moment.
    quick_replies:
      - { id: retry, label: "🔄 Try again" }
    disable_input: true
    on_reply:
      retry: check_registration

  # ===========================================================================
  # STEP 4 — Branch based on registration check
  # ===========================================================================
  - id: branch_registration
    type: branch
    rules:
      - {
          if: "ctx.collected.conflict_count != None and ctx.collected.conflict_count > 0 and ctx.collected.conflict_user_id == ctx.user_id_hash",
          then: same_identifier_message,
        }
      - {
          if: "ctx.collected.conflict_count != None and ctx.collected.conflict_count > 0",
          then: fetch_conflict_enrollments,
        }
    default: guide_self_service_update

  # ===========================================================================
  # 3.0 — Identifier belongs to the CURRENT user
  # ===========================================================================
  - id: same_identifier_message
    type: message
    prompt:
      text: |
        The **{{ ctx.collected.new_identifier }}** you provided is already the active {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }} on your current account!

        Would you like to try entering a different {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }}, or are you all set?
    quick_replies:
      - { id: new, label: "🔄 Try another identifier" }
      - { id: resolved, label: "✅ All good, I'm done" }
    disable_input: true
    on_reply:
      new: ask_identifier_type
      resolved: satisfied

  # ===========================================================================
  # 3.1 — Identifier NOT registered → guide self-service update
  # ===========================================================================
  - id: guide_self_service_update
    type: message
    prompt:
      text: |
        The **{{ ctx.collected.new_identifier }}** is not registered to any other account on the platform.

        Please follow the steps below to update your {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }}:

        1. Go to **View Profile**
        2. Open **Other Details**
        3. Click the ✏️ **Edit icon** next to the {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }} field
        4. Enter the new {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }}
        5. Click **Request OTP**
        6. Enter the OTP received
        7. Verify the OTP
        8. Click **Save Changes**

        Your {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }} will be updated successfully after OTP verification.
    quick_replies:
      - { id: done, label: "✅ Updated successfully" }
      - { id: no_otp, label: "❌ Did not receive OTP" }
    disable_input: true
    on_reply:
      done: satisfied
      no_otp: otp_not_received_fetch_profile

  # ---------------------------------------------------------------------------
  # 3.1.1 — User did not receive the OTP
  # Fetch user profile → MDO leader → YP fallback
  # ---------------------------------------------------------------------------
  - id: otp_not_received_fetch_profile
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/user/private/v1/read/{{ ctx.user_id_hash }}"
    response_mapping:
      - { from: "$.response.rootOrgId", to: collected.root_org_id }
      - { from: "$.response.channel", to: collected.org_channel }
    on_success: otp_not_received_lookup_mdo
    on_error:
      any: otp_no_mdo_fallback
    timeout_ms: 5000

  - id: otp_not_received_lookup_mdo
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/private/user/v1/search"
      body:
        request:
          filters:
            channel: "{{ ctx.collected.org_channel }}"
            organisations.roles: ["MDO_LEADER"]
            status: 1
          limit: 1
    response_mapping:
      - { from: "$.response.count", to: collected.mdo_leader_count }
      - {
          from: "$.response.content[0].profileDetails.personalDetails.firstname",
          to: collected.mdo_leader_name,
        }
      - {
          from: "$.response.content[0].profileDetails.personalDetails.surname",
          to: collected.mdo_leader_surname,
        }
      - {
          from: "$.response.content[0].profileDetails.personalDetails.primaryEmail",
          to: collected.mdo_leader_email,
        }
      - {
          from: "$.response.content[0].firstName",
          to: collected.mdo_leader_name_fallback,
        }
      - {
          from: "$.response.content[0].email",
          to: collected.mdo_leader_email_fallback,
        }
    on_success: branch_otp_mdo_found
    on_error:
      any: otp_yp_data_lookup
    timeout_ms: 5000

  - id: branch_otp_mdo_found
    type: branch
    rules:
      - {
          if: "ctx.collected.mdo_leader_count != None and ctx.collected.mdo_leader_count > 0",
          then: otp_show_mdo_contact,
        }
    default: otp_yp_data_lookup

  - id: otp_show_mdo_contact
    type: message
    prompt:
      text: |
        If you're not receiving the OTP, please connect with the contact below for further assistance:

        👤 **{{ ctx.collected.mdo_leader_name or ctx.collected.mdo_leader_name_fallback }}{{ (' ' ~ ctx.collected.mdo_leader_surname) if ctx.collected.mdo_leader_surname else '' }}**
        📧 {{ ctx.collected.mdo_leader_email or ctx.collected.mdo_leader_email_fallback }}
    next: satisfied

  # Inline YP lookup scoped to the OTP-not-received sub-flow.
  # Named otp_yp_data_lookup to avoid collision with lookup_yp_contact
  # injected by the _yp_lookup fragment (used by domain_invalid path).
  - id: otp_yp_data_lookup
    type: data_lookup
    service: yp_lookup
    key: "{{ ctx.collected.org_channel }}"
    response_mapping:
      - { from: name, to: collected.yp_name }
      - { from: email, to: collected.yp_email }
      - { from: mobile, to: collected.yp_mobile }
      - { from: cc_email, to: collected.yp_cc_email }
    on_success: otp_show_yp_contact
    on_error:
      any: otp_no_mdo_fallback

  - id: otp_show_yp_contact
    type: message
    prompt:
      text: |
        If you're not receiving the OTP, please connect with the contact below for further assistance:

        👤 **{{ ctx.collected.yp_name }}**
        📧 {{ ctx.collected.yp_email }}
        📞 {{ ctx.collected.yp_mobile }}
    next: satisfied

  - id: otp_no_mdo_fallback
    type: message
    prompt:
      text: |
        If you're not receiving the OTP, please contact the **Young Professional (YP)** or **MDO Leader** assigned to your organisation for further assistance.
    next: satisfied

  # ===========================================================================
  # STEP 4 — Identifier ALREADY registered → fetch conflict account enrollments
  # ===========================================================================
  - id: fetch_conflict_enrollments
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/course/private/v4/user/enrollment/list/{{ ctx.collected.conflict_user_id }}"
      body:
        request:
          retiredCoursesEnabled: true
    response_mapping:
      - {
          from: "$.userCourseEnrolmentInfo.coursesInProgress",
          to: collected.conflict_inprogress,
        }
      - {
          from: "$.userCourseEnrolmentInfo.certificatesIssued",
          to: collected.conflict_completed,
        }
    on_success: show_impact_and_confirm
    on_error:
      # If enrollment fetch fails (e.g. cross-user permission), show what we know
      any: show_impact_and_confirm
    timeout_ms: 8000

  # ---------------------------------------------------------------------------
  # Step 4.3 — Inform user about impact and obtain final confirmation
  # ---------------------------------------------------------------------------
  - id: show_impact_and_confirm
    type: ticket_confirm
    prompt:
      text: |
        **Identifier Already Registered**

        The {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }} you have provided is already associated with another account.

        **If we proceed with this update:**
        - The account currently associated with this {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }} will be **deactivated**.
        - Access to that account will **no longer be available**.
        - All existing learning records will remain associated with your current account after the update.

        **Summary of Request:**
        You reported that you would like to update your {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }}. You would like us to raise a support request for this change.

        • **Current {{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }}:** {{ (ctx.collected.current_email or "(your registered identifier)") if ctx.collected.update_type == 'EMAIL' else (ctx.collected.current_phone or "(your registered identifier)") }}
        • **{{ 'Email ID' if ctx.collected.update_type == 'EMAIL' else 'Mobile Number' }} to be Updated:** {{ ctx.collected.new_identifier }}

        Please review the details above and confirm whether they are correct.
    on_confirm: raise_support_ticket
    on_cancel: restart_flow

  # Step 4.6 — User says NO at final confirmation → restart from Step 1
  - id: restart_flow
    type: message
    prompt:
      text: |
        No problem. Let's start over.

        Please share the **Email ID or Mobile Number** you wish to update.
    next: ask_identifier_type

  # ===========================================================================
  # Step 4.5 — Raise Zoho support ticket (after final YES confirmation)
  # ===========================================================================
  - id: raise_support_ticket
    type: transfer_llm
    auto_raise: silent
    llm_context:
      skip_llm: true
      include_messages: false
      include_collected: false
      include_flow_meta: false
    llm_directives:
      subject_hint: "Multiple Account Conflict — {{ ctx.collected.update_type }} Update Request"
      static_description: |
        User ID: {{ ctx.user_id_hash }}
        Current Email ID: {{ ctx.collected.current_email or 'N/A' }}
        New Email ID / Mobile Number: {{ ctx.collected.new_identifier }}
        User Confirmation: YES
        Validation Details: Identifier verified as already registered via /api/private/user/v1/search
        Organization Details: {{ ctx.collected.conflict_org_name or 'Unknown' }}
        Enrollment Details:
        Number of Enrolled Courses: {{ (ctx.collected.conflict_inprogress or 0) + (ctx.collected.conflict_completed or 0) }}
        Number of In-Progress Courses: {{ ctx.collected.conflict_inprogress or 0 }}
        Number of Completed Courses: {{ ctx.collected.conflict_completed or 0 }}

        Confirmation that the user understands the existing account associated with the Email ID / Mobile Number will be deactivated after the update: YES

        Action required: Deactivate the conflicting account and update the user's identifier.

        This is a P3 ticket requiring manual L2 account deactivation. Do NOT auto-apply any changes.
      priority_override: P3
    on_complete: "{{ params.ticket_confirm_node | default('confirm_ticket') }}"
    on_restart: ask_identifier_type
