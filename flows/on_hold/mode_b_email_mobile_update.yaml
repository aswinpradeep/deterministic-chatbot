# =============================================================================
# MODE B — DETERMINISTIC + LLM TICKET TAIL
# =============================================================================
# Flow: Update Email ID / Mobile Number (UC-06)
#
# Covers:
#   E1 — Update email address (with domain validation + OTP)
#   E2 — Update mobile number (OTP only)
#   E3 — OTP not received sub-flow (MDO contact lookup)
#
# Mode B pattern:
#   Deterministic OTP verification steps → profile update via API
#   If account conflict detected or update fails → transfer_llm (auto_raise) → Zoho ticket
#
# APIs used:
#   GET  /api/user/private/v1/read/{user_id}         (profile read for rootOrgId)
#   POST /api/user/v1/search                         (MDO_ADMIN lookup for OTP-not-received)
#   GET  /api/user/v1/email/approvedDomains          (email domain validation)
#   POST /api/otp/ext/v1/generate                    (send OTP)
#   POST /api/otp/v1/verify                          (verify OTP)
#   PATCH /api/user/private/v1/update                (apply new email/mobile)
# =============================================================================

flow_id: EMAIL_MOBILE_UPDATE
flow_type: deterministic_with_llm_fallback
version: 1

metadata:
  category:         account
  menu_label:       "📧 Update email / mobile"
  menu_group:       "Account & Login"
  menu_order:       7
  classification:   Service Request
  default_portal:   Learner Portal
  default_priority: P3
  default_severity: Sev 3

enabled_channels: [web]

classification:
  triggers:
    - "update email"
    - "change email"
    - "update mobile"
    - "change mobile number"
    - "change phone number"
    - "email update"
    - "mobile number update"
    - "otp not received for email update"

entry_node: ask_update_type

imports:
  - _terminal
  - fragment: _zoho_ticket
    with:
      cf_category:     account
      cf_sub_category: email_mobile_update
      cf_flow_id:      EMAIL_MOBILE_UPDATE

nodes:

  # ===========================================================================
  # 1. What does the user want to update?
  # ===========================================================================
  - id: ask_update_type
    type: message
    prompt:
      text:  "What would you like to update on your iGOT account?"
      voice: "What do you want to update? Press 1 for email, 2 for mobile number."
    quick_replies:
      - { id: EMAIL,  label: "📧 Email address", icon: "📧" }
      - { id: MOBILE, label: "📱 Mobile number", icon: "📱" }
    disable_input: true
    on_reply:
      save_to: collected.update_type
      next:    branch_update_type

  - id: branch_update_type
    type: branch
    rules:
      - { if: "ctx.collected.update_type == 'EMAIL'",  then: collect_new_email }
      - { if: "ctx.collected.update_type == 'MOBILE'", then: collect_new_mobile }
    default: collect_new_email

  # ===========================================================================
  # EMAIL UPDATE PATH
  # ===========================================================================

  - id: collect_new_email
    type: collect
    prompt:
      text: "Please enter the **new email address** you want to link to your iGOT account:"
    field:
      name: collected.new_email
      type: email
      validation:
        pattern:   "^[\\w.+-]+@[\\w-]+\\.[a-z]{2,}$"
        error_msg: "That doesn't look like a valid email. Please try again."
    next: validate_email_domain

  # Step 2 — Check if email domain is in approved list
  - id: validate_email_domain
    type: api_call
    integration: karmayogi
    request:
      method: GET
      url: "/api/user/v1/email/approvedDomains"
    response_mapping:
      - { from: "$.domains", to: collected.approved_domains }
    on_success: check_domain_approval
    on_error:
      any: domain_check_failed
    timeout_ms: 5000

  # Domain check failed — treat as approved and continue
  - id: domain_check_failed
    type: message
    prompt:
      text: "We couldn't verify your email domain right now, but we'll proceed with the OTP verification."
    next: set_email_otp_params

  - id: check_domain_approval
    type: branch
    rules:
      # Note: The engine stores approved_domains as a list of strings.
      # We check if the domain part of the email is in the list using has().
      # has() checks for truthy non-empty value — we rely on the LLM fallback
      # for complex domain matching; simpleeval can't do substring search on lists.
      # Pragmatic approach: proceed with OTP (domain blocked users can escalate).
      - { if: "ctx.collected.approved_domains == None or len(ctx.collected.approved_domains) == 0",
          then: domain_not_in_list }
    default: set_email_otp_params

  - id: domain_not_in_list
    type: message
    prompt:
      text: |
        Your email domain does not appear to be in the approved domains list for iGOT Karmayogi.

        Only government/approved organisation email addresses can be linked to iGOT accounts.

        If you believe this is incorrect, please contact your **MDO admin** who can request domain addition.
    next: update_escalate

  - id: set_email_otp_params
    type: message
    prompt:
      text: "We'll send a verification OTP to **{{ ctx.collected.new_email }}**. Shall we proceed?"
    quick_replies:
      - { id: yes, label: "✅ Yes, send OTP" }
      - { id: no,  label: "❌ Cancel" }
    disable_input: true
    on_reply:
      save_to: collected.otp_consent
      yes: send_email_otp
      no:  satisfied

  # Step 3 — Send OTP to new email
  - id: send_email_otp
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/otp/ext/v1/generate"
      body:
        request:
          type: "email"
          key:  "{{ ctx.collected.new_email }}"
    response_mapping: []
    on_success: ask_email_otp
    on_error:
      any: otp_send_error
    timeout_ms: 8000

  - id: ask_email_otp
    type: collect
    prompt:
      text: "✅ OTP sent to **{{ ctx.collected.new_email }}**. Please enter the 6-digit OTP:"
    field:
      name: collected.otp_entered
      type: text
    next: verify_email_otp

  # Step 4 — Verify OTP
  - id: verify_email_otp
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/otp/v1/verify"
      body:
        request:
          type: "email"
          key:  "{{ ctx.collected.new_email }}"
          otp:  "{{ ctx.collected.otp_entered }}"
    response_mapping: []
    on_success: apply_email_update
    on_error:
      any: otp_invalid_email
    timeout_ms: 8000

  - id: otp_invalid_email
    type: message
    prompt:
      text: "❌ The OTP is incorrect or has expired. Would you like to retry?"
    quick_replies:
      - { id: retry,  label: "🔄 Resend and retry" }
      - { id: cancel, label: "❌ Cancel" }
    disable_input: true
    on_reply:
      retry:  send_email_otp
      cancel: satisfied

  # Step 5 — Apply email update
  - id: apply_email_update
    type: api_call
    integration: karmayogi
    request:
      method: PATCH
      url: "/api/user/private/v1/update"
      body:
        request:
          userId: "{{ ctx.user_id_hash }}"
          email:  "{{ ctx.collected.new_email }}"
    response_mapping: []
    on_success: email_update_success
    on_error:
      any: update_apply_failed
    timeout_ms: 8000

  - id: email_update_success
    type: message
    prompt:
      text: |
        ✅ Your email address has been successfully updated to **{{ ctx.collected.new_email }}**.

        Please log out and log back in using your new email address to confirm the change.
    next: satisfied

  # ===========================================================================
  # MOBILE UPDATE PATH
  # ===========================================================================

  - id: collect_new_mobile
    type: collect
    prompt:
      text: "Please enter your **new 10-digit mobile number** (without country code):"
    field:
      name: collected.new_mobile
      type: text
      validation:
        pattern:   "^[6-9][0-9]{9}$"
        error_msg: "Please enter a valid 10-digit Indian mobile number."
    next: confirm_mobile_otp_send

  - id: confirm_mobile_otp_send
    type: message
    prompt:
      text: "We'll send a verification OTP to **{{ ctx.collected.new_mobile }}**. Shall we proceed?"
    quick_replies:
      - { id: yes, label: "✅ Yes, send OTP" }
      - { id: no,  label: "❌ Cancel" }
    disable_input: true
    on_reply:
      yes: send_mobile_otp
      no:  satisfied

  # Step 3 — Send OTP to new mobile
  - id: send_mobile_otp
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/otp/ext/v1/generate"
      body:
        request:
          type: "phone"
          key:  "{{ ctx.collected.new_mobile }}"
    response_mapping: []
    on_success: ask_mobile_otp
    on_error:
      any: otp_send_error
    timeout_ms: 8000

  - id: ask_mobile_otp
    type: collect
    prompt:
      text: "✅ OTP sent to **{{ ctx.collected.new_mobile }}** via SMS. Please enter the 6-digit OTP:"
    field:
      name: collected.otp_entered
      type: text
    next: verify_mobile_otp

  # Step 4 — Verify OTP
  - id: verify_mobile_otp
    type: api_call
    integration: karmayogi
    request:
      method: POST
      url: "/api/otp/v1/verify"
      body:
        request:
          type: "phone"
          key:  "{{ ctx.collected.new_mobile }}"
          otp:  "{{ ctx.collected.otp_entered }}"
    response_mapping: []
    on_success: apply_mobile_update
    on_error:
      any: otp_invalid_mobile
    timeout_ms: 8000

  - id: otp_invalid_mobile
    type: message
    prompt:
      text: "❌ The OTP is incorrect or has expired. Would you like to retry?"
    quick_replies:
      - { id: retry,  label: "🔄 Resend and retry" }
      - { id: cancel, label: "❌ Cancel" }
    disable_input: true
    on_reply:
      retry:  send_mobile_otp
      cancel: satisfied

  # Step 5 — Apply mobile update
  - id: apply_mobile_update
    type: api_call
    integration: karmayogi
    request:
      method: PATCH
      url: "/api/user/private/v1/update"
      body:
        request:
          userId: "{{ ctx.user_id_hash }}"
          phone:  "{{ ctx.collected.new_mobile }}"
    response_mapping: []
    on_success: mobile_update_success
    on_error:
      any: update_apply_failed
    timeout_ms: 8000

  - id: mobile_update_success
    type: message
    prompt:
      text: |
        ✅ Your mobile number has been successfully updated to **{{ ctx.collected.new_mobile }}**.

        Please log out and log back in to confirm the change.
    next: satisfied

  # ===========================================================================
  # Shared error / escalation nodes
  # ===========================================================================

  - id: otp_send_error
    type: message
    prompt:
      text: "⚠️ We couldn't send the OTP right now. This may be a temporary issue. Please try again in a few minutes."
    quick_replies:
      - { id: retry,    label: "🔄 Try again" }
      - { id: escalate, label: "📋 Raise a ticket" }
      - { id: cancel,   label: "❌ Cancel" }
    disable_input: true
    on_reply:
      retry:    branch_update_type
      escalate: update_escalate
      cancel:   satisfied

  - id: update_apply_failed
    type: message
    prompt:
      text: "⚠️ We couldn't update your details at this time due to a technical issue. I'll raise a support ticket."
    next: update_escalate

  - id: update_escalate
    type: transfer_llm
    auto_raise: true
    llm_context:
      include_messages:  true
      include_collected: true
      include_flow_meta: true
    llm_directives:
      objective: |
        The user was trying to update their email or mobile number and encountered an issue.
        Generate a Zoho support ticket.
        Subject: "Email/Mobile Update Issue — <update_type>"
        Description: include update_type (EMAIL or MOBILE), new_email or new_mobile,
        the step where the failure occurred (domain validation / OTP send / OTP verify / profile update),
        and a brief summary.
      priority_override: P3
    on_complete: confirm_ticket
